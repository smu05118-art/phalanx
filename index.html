<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>Phalanx · Japan Trade Dashboard</title>
<style>
:root{--bg:#06060e;--s1:#0d0d1a;--s2:#141428;--bd:#28284a;--tx:#e8e8f4;--dim:#6a6a9a;--a1:#00e6b8;--a2:#3d8bfd;--a3:#ff5c5c;--a4:#ffbe2e;--a5:#c45cff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;}
.app{max-width:1820px;margin:0 auto;padding:14px 14px 80px;}
header{display:flex;align-items:center;gap:10px;padding:6px 2px 12px;}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:10px;display:grid;place-items:center;font-size:16px;font-weight:900;color:#04121b;flex-shrink:0;}
header h1{font-size:16px;font-weight:800;letter-spacing:-.3px;}
header h1 em{color:var(--a1);font-style:normal;}
.sub{color:var(--dim);font-size:10px;font-family:monospace;margin-top:2px;}

.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;margin:2px 2px 12px;color:var(--dim);}
.crumb b{color:var(--tx);font-weight:700;}
.crumb .cl{cursor:pointer;color:var(--a2);}
.crumb .cl:hover{text-decoration:underline;}
.crumb .sep{color:var(--bd);}

.ctrl{position:sticky;top:0;z-index:20;background:var(--bg);padding:6px 0 8px;border-bottom:1px solid var(--bd);margin-bottom:10px;}
.row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center;}
.row:last-child{margin-bottom:0;}
.lbl-sm{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-right:3px;font-weight:700;}
.pill{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);white-space:nowrap;transition:.15s;user-select:none;-webkit-user-select:none;font-family:inherit;}
.pill:hover{border-color:var(--a2);}
.pill.on{color:#000;border-color:var(--a1);background:var(--a1);}
.pill.cur.on{background:var(--a4);border-color:var(--a4);color:#000;}
.pill.b.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.pill.y.on{background:var(--a4);border-color:var(--a4);color:#000;}
.pill.empty{opacity:.4;}
.cats{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cats::-webkit-scrollbar{display:none;}
.search{flex:1;min-width:120px;max-width:240px;padding:7px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:13px;font-family:inherit;outline:none;}
.search:focus{border-color:var(--a1);}
.back{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--a1);}
.back:hover{border-color:var(--a1);}

.cnt{font-size:10px;color:var(--dim);margin:8px 0 8px 2px;}
.ov-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:760px){.ov-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1240px){.ov-grid{grid-template-columns:1fr 1fr 1fr;}}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;overflow:hidden;}
.card.co{cursor:pointer;transition:.15s;}
.card.co:hover{border-color:var(--a1);transform:translateY(-2px);}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-hd h3{font-size:15px;font-weight:800;line-height:1.2;}
.card-hd h3 small{color:var(--dim);font-weight:600;font-size:11px;}
.co-cat{margin-top:4px;font-size:11px;font-weight:700;color:var(--a2);}
.cat-tag{font-size:10px;font-weight:800;padding:4px 9px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--a4);white-space:nowrap;flex-shrink:0;}
.headline{display:flex;align-items:baseline;gap:14px;margin:12px 0 4px;flex-wrap:wrap;}
.headline .big{font-size:24px;font-weight:800;font-family:monospace;letter-spacing:-.5px;}
.headline .chg{font-size:13px;font-weight:700;}
.headline .clab{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:2px;}
.rev-lab{font-size:10px;color:var(--dim);margin-bottom:8px;}
.up{color:var(--a1);}.dn{color:var(--a3);}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:10px;color:var(--dim);margin:4px 0 4px;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:14px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block;}
.legend i.bar{width:11px;height:11px;border-radius:2px;border:0;}
.ch-main{height:240px;position:relative;}
.ch-main canvas{display:block;width:100%!important;height:100%!important;}
.divid{border-top:1px solid var(--bd);margin:14px 0 8px;}
.sub-ttl{font-size:12px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.ch-yr{height:190px;position:relative;}
.ch-yr canvas{display:block;width:100%!important;height:100%!important;}

/* detail view */
.hero{margin:2px 0 14px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1080px){.grid{grid-template-columns:1fr 1fr 1fr;}}
.card.hero{border-color:var(--a1);}
.card.hero .card-hd h3{font-size:15px;}
.metrics{display:flex;gap:14px;margin:8px 0;flex-wrap:wrap;align-items:baseline;}
.metric .val{font-size:14px;font-weight:800;font-family:monospace;}
.metric .lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.metric .chg{font-size:10px;font-weight:700;margin-left:4px;}
.ch-wrap{height:200px;position:relative;}
.card.hero .ch-wrap{height:300px;}
.ch-wrap canvas{display:block;width:100%!important;height:100%!important;}
.cat-tag.Kyushu{color:var(--a4);}.cat-tag.Kansai{color:var(--a5);}
.empty-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px;border:1px dashed var(--bd);border-radius:12px;}
.foot{margin-top:22px;padding-top:12px;border-top:1px solid var(--bd);font-size:10px;color:var(--dim);line-height:1.7;}
.foot code{background:var(--s2);padding:1px 5px;border-radius:4px;color:var(--a1);}
.load-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px;}
.tabs{display:flex;gap:6px;margin:2px 2px 10px;}
.tab{padding:7px 15px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);}
.tab:hover{border-color:var(--a2);}
.tab.on{background:var(--a1);border-color:var(--a1);color:#04121b;}
.star{cursor:pointer;font-size:17px;line-height:1;background:none;border:0;color:var(--bd);padding:0 2px;transition:.15s;}
.star:hover{color:var(--a4);}
.star.on{color:var(--a4);}
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px;}
.panel h2{font-size:14px;font-weight:800;margin-bottom:12px;}
.add-form{display:grid;grid-template-columns:minmax(120px,1.2fr) minmax(100px,1fr) minmax(120px,1fr) minmax(120px,1.4fr) auto;gap:6px;width:100%;align-items:center;}
.add-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px;width:100%;align-items:center;}
.spec{font-size:11px;color:var(--dim);margin-top:10px;line-height:1.6;}
.spec b{color:var(--tx);font-family:monospace;}
.add-input,.add-select{padding:8px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:12px;font-family:inherit;outline:none;min-width:0;}
.add-input:focus,.add-select:focus{border-color:var(--a1);}
.add-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--a1);background:var(--a1);color:#04121b;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.add-status{min-height:14px;font-size:11px;color:var(--dim);margin-top:8px;}
.add-status.err{color:var(--a3);}.add-status.ok{color:var(--a1);}
.watch-list{display:flex;gap:6px;flex-wrap:wrap;}
.watch-item{display:flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);font-size:12px;}
.watch-item b{font-weight:700;}.watch-item button{border:0;background:transparent;color:var(--dim);font-size:14px;line-height:1;cursor:pointer;}
.watch-item button:hover{color:var(--a3);}
.watch-empty{font-size:12px;color:var(--dim);padding:6px 2px;}
.card.stub{border:1px dashed var(--bd);}
.pill.r.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.brush{position:relative;height:44px;margin:5px 0 2px;border:1px solid var(--bd);border-radius:8px;background:var(--s1);overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
.brush canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
.brush-win{position:absolute;top:0;bottom:0;left:0;width:100%;background:rgba(61,139,253,.13);border-left:2px solid var(--a2);border-right:2px solid var(--a2);cursor:grab;box-sizing:border-box;}
.brush-win:active{cursor:grabbing;}
.bh{position:absolute;top:0;bottom:0;width:12px;cursor:ew-resize;background:rgba(61,139,253,.3);}
.bh-l{left:-2px;}.bh-r{right:-2px;}
.hsinfo{margin:8px 2px 2px;border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.hsinfo .hdr{font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;background:var(--s2);border-bottom:1px solid var(--bd);}
.hsinfo table{width:100%;border-collapse:collapse;font-size:11px;}
.hsinfo th{background:var(--s2);color:var(--dim);font-weight:700;text-align:left;padding:5px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.4px;}
.hsinfo td{padding:7px 10px;border-top:1px solid var(--bd);vertical-align:top;line-height:1.4;}
.hsinfo .code{font-family:monospace;font-weight:800;color:var(--a2);white-space:nowrap;}
.hsinfo tr.main .code{color:var(--a1);}
.hsinfo tr.main{background:rgba(0,230,184,.05);}
.hsinfo .full{font-family:monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.hsinfo td.mp{color:var(--tx);}.hsinfo tr.main td.mp{color:var(--a1);font-weight:600;}
.port-map{font-size:10px;color:var(--dim);margin:0 0 8px;line-height:1.45;padding:6px 8px;background:var(--s2);border-radius:6px;border-left:2px solid var(--bd);}
.port-map b{color:var(--a2);font-weight:700;}
.port-map.main{border-left-color:var(--a1);}.port-map.main b{color:var(--a1);}
.pill.s.on{background:var(--a5);border-color:var(--a5);color:#fff;}
.pill.f.on{background:var(--a3);border-color:var(--a3);color:#fff;}
.pill.g.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.pill.cm.on{background:var(--a5);border-color:var(--a5);color:#fff;}
.co-note{font-size:10px;line-height:1.5;color:var(--a4);background:rgba(255,190,46,.08);border:1px solid rgba(255,190,46,.25);border-radius:6px;padding:6px 9px;margin:2px 0 8px;}
.hub-metrics{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 11px;margin:2px 0 8px;}
.hub-metrics .hm{display:flex;align-items:baseline;gap:4px;}
.hub-metrics .hmv{font-size:14px;font-weight:800;font-family:monospace;}
.hub-metrics .hml{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;}
.hub-metrics .hm-c{display:flex;flex-wrap:wrap;align-items:center;gap:6px;flex:1;min-width:140px;}
.hub-metrics .cc{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--tx);}
.hub-metrics .cc i{width:9px;height:9px;border-radius:2px;display:inline-block;}
.hub-panel{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--a4);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.hp-row{display:flex;flex-wrap:wrap;gap:14px 26px;align-items:flex-start;}
.hp-m{display:flex;flex-direction:column;gap:1px;}
.hp-m .chg{font-size:11px;font-weight:700;}
.hp-v{font-size:20px;font-weight:800;font-family:monospace;letter-spacing:-.3px;}
.hp-l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.hp-c{flex:1;min-width:220px;}
.sbar{display:flex;height:14px;border-radius:4px;overflow:hidden;margin:5px 0 6px;background:var(--bd);}
.sbar .sb{height:100%;}
.hp-leg{display:flex;flex-wrap:wrap;gap:5px 12px;}
.hp-leg .cc{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;}
.hp-leg .cc i{width:9px;height:9px;border-radius:2px;display:inline-block;}
.split-note{font-size:10px;color:var(--a5);margin:4px 2px 0;font-weight:600;}
.regbar{display:flex;gap:8px;margin:2px 2px 12px;flex-wrap:wrap;}
.regbtn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:11px;border:1px solid var(--bd);background:var(--s1);color:var(--dim);font-weight:800;font-size:14px;cursor:pointer;transition:.12s;}
.regbtn .rf{font-size:17px;}
.regbtn:hover{border-color:var(--a2);color:var(--tx);}
.regbtn.on{background:linear-gradient(135deg,var(--s2),var(--s1));border-color:var(--a1);color:var(--tx);box-shadow:0 0 0 1px var(--a1) inset;}
.regbtn .rwait{font-size:9px;color:var(--a4);font-weight:700;margin-left:2px;}
.reggrp{display:inline-flex;align-items:center;gap:7px;padding:5px 9px 5px 5px;border-radius:14px;border:1px dashed var(--bd);flex-wrap:wrap;}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:9px;white-space:nowrap;}
.badge.b-p{background:rgba(255,190,46,.14);color:#ffbe2e;border:1px solid rgba(255,190,46,.35);}
.badge.b-f{background:rgba(0,230,184,.12);color:#00e6b8;border:1px solid rgba(0,230,184,.3);}
.hscode{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.02em;}
.chg.pv{color:#ffbe2e;}
.reggrp.cur{border-style:solid;border-color:var(--a2);}
.reggrp-l{font-size:11px;font-weight:900;color:var(--a4);letter-spacing:.06em;padding:0 4px 0 7px;white-space:nowrap;}
@media(max-width:680px){.add-form{grid-template-columns:1fr 1fr;}.add-btn{grid-column:1/-1;}}
</style>
</head>
<body>
<div class="app">
<header>
<div class="logo">日</div>
<div>
<h1>Phalanx · <em>Japan</em> Trade</h1>
<div class="sub" id="sub">loading…</div>
</div>
</header>

<div class="regbar" id="regionRow"></div>

<div class="tabs" id="tabs">
  <span class="tab on" data-tab="dash">대시보드</span>
  <span class="tab" data-tab="watch">관심기업 추가</span>
</div>

<div class="crumb" id="crumb"></div>

<div class="ctrl">
  <div class="row" id="curRow">
    <span class="lbl-sm">통화</span>
    <input class="search" id="q" placeholder="기업 검색…">
  </div>
  <div class="row cats" id="catRow"></div>
  <div class="row" id="rangeRow">
    <span class="lbl-sm">기간</span>
    <span class="pill r" data-range="3m">3M</span>
    <span class="pill r" data-range="6m">6M</span>
    <span class="pill r" data-range="ytd">YTD</span>
    <span class="pill r" data-range="1y">1Y</span>
    <span class="pill r" data-range="3y">3Y</span>
    <span class="pill r" data-range="5y">5Y</span>
    <span class="pill r" data-range="10y">10Y</span>
    <span class="pill r on" data-range="all">모두</span>
  </div>
  <div class="brush" id="brush"><canvas></canvas>
    <div class="brush-win" id="brushWin"><div class="bh bh-l"></div><div class="bh bh-r"></div></div>
  </div>
</div>

<div class="hsinfo" id="hsinfo"></div>

<div class="cnt" id="cnt"></div>
<div id="main"><div class="load-msg">Loading Chart.js…</div></div>

<div class="foot" id="foot"></div>
</div>

<script src="chartjs_bundle.js"></script>
<script src="manifest.js"></script>
<script>
// ---------- region shards: manifest (PM) always loaded; data_<region>.js lazy ----------
const M = PM, MONTHS = M.months;
M.ports=M.ports||[]; M.portmap=M.portmap||{}; M.hsinfo=M.hsinfo||[];
var P = {meta:M, companies:[], detail:{}, country:{}, country_i:{}, cdata:{}, fin:{}};
const REGIONS = M.regions;
const REGHS = {}, _MERGED = {};
function mergeShard(s){ if(!s||_MERGED[s.id]) return; _MERGED[s.id]=true;
  P.companies=P.companies.concat(s.companies||[]);
  ['detail','country','country_i','cdata','fin'].forEach(k=>Object.assign(P[k], s[k]||{}));
  (s.ports||[]).forEach(p=>{ if(!M.ports.some(x=>x.code===p.code)) M.ports.push(p); });
  Object.assign(M.portmap, s.portmap||{});
  if(s.hsinfo&&s.hsinfo.length) REGHS[s.id]=s.hsinfo;
}
function loadRegion(id, cb){
  const r=REGIONS.find(x=>x.id===id)||REGIONS[0];
  if(_MERGED[r.id]||(window.PSH&&window.PSH[r.id])){ mergeShard(window.PSH&&window.PSH[r.id]); return cb(); }
  if(!r.file) return cb();
  const sub=document.getElementById('sub'); if(sub) sub.textContent='loading '+r.label+'…';
  const sc=document.createElement('script'); sc.src=r.file;
  sc.onload=()=>{ mergeShard(window.PSH&&window.PSH[r.id]); cb(); };
  sc.onerror=()=>cb();
  document.head.appendChild(sc);
}
let CUR = M.currencies;
function regionObj(){ return REGIONS.find(r=>r.id===ST.region) || REGIONS[0]; }
function applyRegion(){ const r=regionObj(); CUR=r.currencies; if(!CUR[ST.cur]) ST.cur=Object.keys(CUR)[0]; }
const YEAR_COLORS = {2022:'#3d8bfd',2023:'#c45cff',2024:'#ffbe2e',2025:'#00e6b8',2026:'#ff5c5c'};
const ST = {view:'overview', region:'JP', tab:'dash', cat:'all', cur:'JPY', q:'',
            company:null, mode:'core', flow:'exp',
            metric:{value:true,weight:false,unit:false}, repr:{level:true,yoy:true,yoy3:false},
            r0:0, r1:MONTHS.length-1, range:'all', split:false, gran:'M', port:null, cmetric:'value',
            fin:{rev:false,op:false,seg:false}, ovN:30};

// ---------- quarterly financials (fiscal_fetch.py -> P.fin) ----------
function finOf(co){ return (P.fin||{})[(co||compObj()).id]; }
// map fin quarters onto the current granularity grid (M: at quarter-end month; Q: exact; Y: summed)
function finSeries(co,k){ const f=finOf(co); if(!f) return null;
  const rows=(k==='seg')?(f.segq||[]):(f.q||[]).map(r=>[r[0], k==='op'?r[2]:r[1]]);
  const pi=gInfo(), out=new Array(pi.n).fill(null);
  rows.forEach(r=>{ const mi=monthIdx[r[0]]; if(mi==null||r[1]==null) return;
    const idx=pi.m2p[mi]; out[idx]=(out[idx]||0)+r[1]; });
  return out.some(v=>v!=null)?out:null; }
function pearson(a,b){ const n=a.length; if(n<4) return null;
  const ma=a.reduce((x,y)=>x+y,0)/n, mb=b.reduce((x,y)=>x+y,0)/n;
  let sa=0,sb=0,sab=0;
  for(let i=0;i<n;i++){ const da=a[i]-ma, db=b[i]-mb; sa+=da*da; sb+=db*db; sab+=da*db; }
  return (sa>0&&sb>0)? sab/Math.sqrt(sa*sb) : null; }
// Pearson corr between calendar-quarter customs revenue and reported quarterly revenue (<=12Q)
function corrInfo(co){ const f=finOf(co); if(!f||co.is_hub) return null;
  const rev=co.revenue, qc={}, qn={};
  MONTHS.forEach((ym,i)=>{ const q=ym.slice(0,4)+'Q'+Math.ceil(+ym.slice(5,7)/3);
    qc[q]=(qc[q]||0)+(rev[i]||0); qn[q]=(qn[q]||0)+1; });
  // prefer SEGMENT revenue when available (customs proxy targets a segment, not the whole company)
  const useSeg=!!(f.segq&&f.segq.length);
  const rows=useSeg?f.segq:f.q;
  const fq={}; rows.forEach(r=>{ if(r[1]!=null){ const q=r[0].slice(0,4)+'Q'+Math.ceil(+r[0].slice(5,7)/3); fq[q]=r[1]; } });
  const keys=Object.keys(fq).filter(q=>qn[q]===3&&qc[q]>0).sort().slice(-12);
  if(keys.length<6) return null;
  const r=pearson(keys.map(q=>qc[q]), keys.map(q=>fq[q]));

// ---------- URL deep-link (shareable state via location.hash + back-button) ----------
let _lastNav=null;
function navSig(){ return [ST.region,ST.tab,ST.view,ST.cat,ST.company,ST.port].join('|'); }
function writeHash(){
  const p=[], add=(k,v)=>{ if(v!=null&&v!=='') p.push(k+'='+encodeURIComponent(v)); };
  add('r',ST.region);
  if(ST.tab!=='dash') add('tab',ST.tab);
  if(ST.view!=='overview') add('v',ST.view);
  if(ST.cat!=='all') add('cat',ST.cat);
  if(ST.company) add('co',ST.company);
  if(ST.view==='country'&&ST.port) add('port',ST.port);
  if(ST.cur!=='JPY') add('cur',ST.cur);
  if(ST.gran!=='M') add('g',ST.gran);
  const h='#'+p.join('&'), cur='#'+(location.hash||'').replace(/^#/,''), sig=navSig();
  if(cur===h){ _lastNav=sig; return; }
  try{ (_lastNav!==null&&sig!==_lastNav) ? history.pushState(null,'',h) : history.replaceState(null,'',h); }
  catch(e){ try{location.hash=h;}catch(_){} }
  _lastNav=sig;
}
function applyHash(){
  const raw=(location.hash||'').replace(/^#/,''); if(!raw) return false;
  const q={}; raw.split('&').forEach(kv=>{ const i=kv.indexOf('='); if(i>0) q[kv.slice(0,i)]=decodeURIComponent(kv.slice(i+1)); });
  if(q.r && REGIONS.some(r=>r.id===q.r)) ST.region=q.r;
  applyRegion();
  if(q.cur && CUR[q.cur]) ST.cur=q.cur;
  if(['M','Q','Y'].includes(q.g)) ST.gran=q.g;
  ST.tab=(q.tab==='watch')?'watch':'dash';
  ST.company=null; ST.view='overview'; ST.port=null; ST.cat=(q.cat||'all');
  if(q.co && P.companies.some(c=>c.id===q.co)){
    ST.company=q.co; const co=P.companies.find(c=>c.id===q.co); if(co) ST.cat=co.category;
    if(q.v==='country'){ ST.view='country'; ST.port=q.port||'ALL'; } else ST.view='detail';
  }
  return true;
}

function coFlowSum(co){ const flow=co.rev_flow||'exp';
  if(co.filtered) return fSum(co, co.main_ports, flow);
  const det=P.detail[co.core_set]||{}, n=MONTHS.length, V=new Array(n).fill(0), W=new Array(n).fill(0);
  co.main_ports.forEach(pc=>{const s=det[pc]; if(!s)return; const v=s[flow].v,w=s[flow].w; for(let i=0;i<n;i++){V[i]+=v[i];W[i]+=w[i];}}); return {v:V,w:W}; }
function coTopC(co,topn){
  if(co.country_groups&&co.country_groups.length){ const fc=fCountryLoc(co,'ALL'), loc=fc.loc, n=MONTHS.length; let li=-1;
    for(let i=n-1;i>=0&&li<0;i--){let s=0;co.countries.forEach(c=>s+=loc[c]?loc[c][i]||0:0);if(s>0)li=i;}
    if(li<0)return {top:[],idx:-1,grouped:true};
    const tot=co.countries.reduce((a,c)=>a+(loc[c]?loc[c][li]||0:0),0)||1;
    const gval=g=>g.countries.reduce((a,c)=>{const nm=(c&&c.c)?c.c:c, w=(c&&c.w!=null)?c.w:1; return a+(loc[nm]?(loc[nm][li]||0)*w:0);},0);
    const top=co.country_groups.map((g,i)=>({name:g.name,share:gval(g)/tot,col:CCOL[i%CCOL.length]}));
    return {idx:li, grouped:true, top:top.sort((a,b)=>b.share-a.share)}; }
  if(co.filtered){ const fc=fCountryLoc(co,'ALL'), ord=fc.order, loc=fc.loc, n=MONTHS.length; let li=-1;
    for(let i=n-1;i>=0&&li<0;i--){let s=0;ord.forEach(c=>s+=loc[c][i]||0);if(s>0)li=i;}
    if(li<0)return {top:[],idx:-1};
    const agg={};ord.forEach(c=>agg[c]=loc[c][li]||0);const tot=Object.values(agg).reduce((a,b)=>a+b,0)||1;
    return {idx:li, top:ord.map((c,i)=>({name:c,share:agg[c]/tot,col:CCOL[i%CCOL.length]})).sort((a,b)=>b.share-a.share).slice(0,topn)}; }
  const src=(co.rev_flow==='imp'?(P.country_i||{}):(P.country||{}))[co.core_set]; if(!src||!src.order||!src.loc) return {top:[],idx:-1};
  const ord=src.order, n=MONTHS.length; let li=-1;
  for(let i=n-1;i>=0&&li<0;i--){ let s=0; co.main_ports.forEach(pc=>{const l=src.loc[pc]; if(l)ord.forEach(c=>s+=(l[c]&&l[c][i])||0);}); if(s>0)li=i; }
  if(li<0) return {top:[],idx:-1};
  const agg={}; ord.forEach(c=>agg[c]=0);
  co.main_ports.forEach(pc=>{const l=src.loc[pc]; if(l)ord.forEach(c=>agg[c]+=(l[c]&&l[c][li])||0);});
  const tot=Object.values(agg).reduce((a,b)=>a+b,0)||1;
  return {idx:li, top:ord.map((c,i)=>({name:c,share:agg[c]/tot,col:CCOL[i%CCOL.length]})).sort((a,b)=>b.share-a.share).slice(0,topn)}; }

// ---------- granularity (Monthly / Quarterly / Yearly) ----------
function periodInfo(g){ periodInfo._c=periodInfo._c||{}; if(periodInfo._c[g]) return periodInfo._c[g];
  let keys=[],m2p=[],label=[],cnt=[];
  if(g==='M'){ keys=MONTHS.slice(); m2p=MONTHS.map((_,i)=>i); label=MONTHS.map(mlabel); cnt=MONTHS.map(()=>1); }
  else { const seen={};
    MONTHS.forEach(ym=>{ const y=ym.slice(0,4),mo=+ym.slice(5,7), key=g==='Q'?`${y}-Q${Math.ceil(mo/3)}`:y;
      if(!(key in seen)){ seen[key]=keys.length; keys.push(key); label.push(g==='Q'?y.slice(2)+'Q'+Math.ceil(mo/3):y); cnt.push(0); }
      cnt[seen[key]]++; m2p.push(seen[key]); }); }
  const full=g==='M'?1:g==='Q'?3:12;
  if(g!=='M'&&cnt.length&&cnt[cnt.length-1]<full) label[label.length-1]+='*';
  return periodInfo._c[g]={keys,m2p,label,n:keys.length,lag:g==='M'?12:g==='Q'?4:1,cnt,full};
}
function gInfo(){ return periodInfo(ST.gran); }
function gLabels(){ return gInfo().label; }
function xMin(){ return gInfo().m2p[ST.r0]; }
function xMax(){ return gInfo().m2p[ST.r1]; }
function aggLevel(arr){ if(ST.gran==='M') return arr; const pi=gInfo(),out=new Array(pi.n).fill(0); for(let i=0;i<arr.length;i++){ if(arr[i]!=null) out[pi.m2p[i]]+=arr[i]; } return out; }
function yoyG(level){ const pi=gInfo(),lag=pi.lag; return level.map((v,i)=>(v!=null&&i>=lag&&level[i-lag]>0&&pi.cnt[i]>=pi.full)?v/level[i-lag]-1:null); }
function yoy3G(level){ const pi=gInfo(),lag=pi.lag,r=level.map((v,i)=>(i<2||level[i]==null||level[i-1]==null||level[i-2]==null)?null:level[i]+level[i-1]+level[i-2]); return r.map((v,i)=>(v!=null&&i>=lag&&r[i-lag]!=null&&r[i-lag]>0&&pi.cnt[i]>=pi.full)?v/r[i-lag]-1:null); }

// ---------- company helpers (per-company port sets; "ALL" = sum of company ports) ----------
function compObj(){ return P.companies.find(c=>c.id===ST.company)||P.companies[0]; }
function compPorts(){ return compObj().ports; }
function setKey(){ const co=compObj(); return ST.mode==='broad'? co.broad_set : co.core_set; }
function sumDetail(sk, ports){ const n=MONTHS.length, z=()=>new Array(n).fill(0), det=P.detail[sk]||{};
  const out={exp:{v:z(),w:z()},imp:{v:z(),w:z()}};
  ports.forEach(pc=>{ const s=det[pc]; if(!s)return; ['exp','imp'].forEach(f=>['v','w'].forEach(k=>{ const a=s[f][k]; for(let i=0;i<n;i++) out[f][k][i]+=a[i]; })); });
  return out; }
// ---- country-filtered companies (HS × customs × country cube in P.cdata[id]) ----
function isF(co){ co=co||compObj(); return !!co.filtered; }
function fSum(co, ports, flow){ const bpc=(P.cdata[co.id]||{}).bpc||{}, n=MONTHS.length, V=new Array(n).fill(0), W=new Array(n).fill(0);
  ports.forEach(pc=>{const pp=bpc[pc]; if(!pp)return; co.countries.forEach(c=>{const s=pp[c]; if(!s)return; const v=s[flow].v,w=s[flow].w; for(let i=0;i<n;i++){V[i]+=v[i];W[i]+=w[i];}});}); return {v:V,w:W}; }
function fPortSeries(co, code){ const ports=code==='ALL'?co.ports:[code]; return {exp:fSum(co,ports,'exp'), imp:fSum(co,ports,'imp')}; }
function fCountryLoc(co, code){ const bpc=(P.cdata[co.id]||{}).bpc||{}, n=MONTHS.length, flow=co.rev_flow||'exp', ports=code==='ALL'?co.ports:[code], loc={}, locw={};
  co.countries.forEach(c=>{loc[c]=new Array(n).fill(0);locw[c]=new Array(n).fill(0);});
  ports.forEach(pc=>{const pp=bpc[pc]; if(!pp)return; co.countries.forEach(c=>{const s=pp[c]; if(!s)return; const v=s[flow].v,w=s[flow].w; for(let i=0;i<n;i++){loc[c][i]+=v[i];locw[c][i]+=w[i];}});});
  const order=co.countries.slice().sort((a,b)=>loc[b].reduce((x,y)=>x+y,0)-loc[a].reduce((x,y)=>x+y,0));
  return {order, loc, locw}; }

// ---------- detail (per-port): Value(¥) / Weight(kg) / Unit(¥/kg) x Level / YoY / 3p YoY ----------
function dseries(code){ const co=compObj();
  if(isF(co)){ const s=fPortSeries(co,code); return {exp:{v:s.exp.v,w:s.exp.w}, imp:{v:s.imp.v,w:s.imp.w}}; }
  const det=P.detail[setKey()]||{}; const allPorts=(co&&co.total_ports&&co.total_ports.length)?co.total_ports:compPorts(); const s = code==='ALL' ? sumDetail(setKey(), allPorts) : (det[code]||{exp:{v:[],w:[]},imp:{v:[],w:[]}}); return {exp:{v:s.exp.v,w:s.exp.w}, imp:{v:s.imp.v,w:s.imp.w}}; }
const DCOL={exp:{value:'#3d8bfd',weight:'#ffbe2e',unit:'#c45cff'},imp:{value:'#00e6b8',weight:'#ff8a3d',unit:'#7da0ff'}};
function unitDispG(v,w){ const av=aggLevel(v),aw=aggLevel(w),k=CUR[ST.cur].mult; return av.map((x,i)=>aw[i]>0?x*k/aw[i]:null); }
function unitRatioG(v,w){ const av=aggLevel(v),aw=aggLevel(w); return av.map((x,i)=>aw[i]>0?x/aw[i]:null); }
function cflow(){ return compObj().rev_flow || 'exp'; }
function countrySrc(){ const sk=setKey(); return (cflow()==='imp' && (P.country_i||{})[sk]) ? P.country_i[sk] : (P.country||{})[sk]; }
function flowKLabel(){ return cflow()==='imp'?'수입국별':'수출국별'; }
function countryLoc(code){
  const co=compObj(); if(isF(co)) return fCountryLoc(co, code);
  const cd=countrySrc(); if(!cd||!cd.loc) return {order:null,loc:{},locw:{}};
  if(code!=='ALL') return {order:cd.order, loc:cd.loc[code]||{}, locw:(cd.locw||{})[code]||{}};
  const n=MONTHS.length, lv={}, lw={}; cd.order.forEach(c=>{lv[c]=new Array(n).fill(0);lw[c]=new Array(n).fill(0);});
  compPorts().forEach(pc=>{ const l=cd.loc[pc], w=(cd.locw||{})[pc];
    if(l)cd.order.forEach(c=>{const a=l[c]||[];for(let i=0;i<n;i++)lv[c][i]+=(a[i]||0);});
    if(w)cd.order.forEach(c=>{const a=w[c]||[];for(let i=0;i<n;i++)lw[c][i]+=(a[i]||0);}); });
  return {order:cd.order, loc:lv, locw:lw};
}
// country value (¥) stacked-area datasets — used by the in-detail 수출국별 overlay
function countryDatasets(code){
  const {order,loc}=countryLoc(code); if(!order) return [];
  const k=CUR[ST.cur].mult;
  return order.map((c,i)=>{const col=CCOL[i%CCOL.length], lv=aggLevel(loc[c]||[]);
    return {type:'line',label:c,data:lv.map(x=>x==null?null:x*k),yAxisID:'yV',
      backgroundColor:col+'cc',borderColor:col,borderWidth:.7,pointRadius:0,fill:true,tension:.2,stack:'c'};});
}
// Level-3 country view: 값(value) / 비중(share%) / YoY / 단가(¥/kg)
function countryView(code){
  const {order,loc,locw}=countryLoc(code); if(!order) return {ds:[],kind:'value'};
  const k=CUR[ST.cur].mult, lvl={}, wlv={}; order.forEach(c=>{lvl[c]=aggLevel(loc[c]||[]); wlv[c]=aggLevel(locw[c]||[]);});
  const n=(lvl[order[0]]||[]).length, cm=ST.cmetric||'value';
  const area=(c,i,d)=>({type:'line',label:c,data:d,yAxisID:'yV',backgroundColor:CCOL[i%CCOL.length]+'cc',borderColor:CCOL[i%CCOL.length],borderWidth:.7,pointRadius:0,fill:true,tension:.2,stack:'c'});
  const line=(c,i,d)=>({type:'line',label:c,data:d,yAxisID:'yV',borderColor:CCOL[i%CCOL.length],borderWidth:1.4,pointRadius:0,tension:.25,spanGaps:true});
  if(cm==='value') return {kind:'value', ds:order.map((c,i)=>area(c,i,lvl[c].map(x=>x==null?null:x*k)))};
  if(cm==='share'){ const tot=new Array(n).fill(0); order.forEach(c=>lvl[c].forEach((x,j)=>tot[j]+=(x||0)));
    return {kind:'share', ds:order.map((c,i)=>area(c,i,lvl[c].map((x,j)=>tot[j]>0?x/tot[j]:null)))}; }
  if(cm==='yoy') return {kind:'yoy', ds:order.map((c,i)=>line(c,i,yoyG(lvl[c])))};
  return {kind:'unit', ds:order.map((c,i)=>line(c,i,lvl[c].map((x,j)=>wlv[c][j]>0?x*k/wlv[c][j]:null)))};
}

function dDatasets(code){
  if(ST.split) return countryDatasets(code);
  const s=dseries(code), M=ST.metric, R=ST.repr, k=CUR[ST.cur].mult, ds=[];
  const flows=[]; if(ST.flow!=='imp')flows.push(['exp','Export']); if(ST.flow!=='exp')flows.push(['imp','Import']);
  flows.forEach(([fk,fl])=>{
    const av=aggLevel(s[fk].v), aw=aggLevel(s[fk].w), cvv=av.map(x=>x==null?null:x*k), ud=unitDispG(s[fk].v,s[fk].w), dash=fk==='imp'?[4,3]:[];
    if(R.level){
      if(M.value){ if(fk==='exp') ds.push({type:'bar',label:fl+' Value',data:cvv,yAxisID:'yV',backgroundColor:DCOL.exp.value+'73',borderColor:DCOL.exp.value,borderWidth:0,order:9,barPercentage:1,categoryPercentage:.92});
                   else ds.push({type:'line',label:fl+' Value',data:cvv,yAxisID:'yV',borderColor:DCOL.imp.value,borderWidth:1.5,pointRadius:0,tension:.25,order:8}); }
      if(M.weight){ if(fk==='exp') ds.push({type:'bar',label:fl+' kg',data:aw,yAxisID:'yW',backgroundColor:DCOL.exp.weight+'73',borderColor:DCOL.exp.weight,borderWidth:0,order:8,barPercentage:1,categoryPercentage:.92});
                    else ds.push({type:'line',label:fl+' kg',data:aw,yAxisID:'yW',borderColor:DCOL.imp.weight,borderWidth:1.5,pointRadius:0,tension:.25,order:7,borderDash:dash}); }
      if(M.unit) ds.push({type:'line',label:fl+' '+CUR[ST.cur].sym+'/kg',data:ud,yAxisID:'yU',borderColor:DCOL[fk].unit,borderWidth:1.6,pointRadius:0,tension:.25,order:6,borderDash:dash});
    }
    [['yoy',yoyG,'YoY',[5,4]],['yoy3',yoy3G,'3p YoY',[2,3]]].forEach(([rk,fn,lab,d2])=>{
      if(!R[rk])return;
      if(M.value)  ds.push({type:'line',label:`${fl} Value ${lab}`,data:fn(av), yAxisID:'yP',borderColor:DCOL[fk].value, borderWidth:1.2,borderDash:d2,pointRadius:0,tension:.2,order:3,spanGaps:true});
      if(M.weight) ds.push({type:'line',label:`${fl} kg ${lab}`,   data:fn(aw), yAxisID:'yP',borderColor:DCOL[fk].weight,borderWidth:1.2,borderDash:d2,pointRadius:0,tension:.2,order:2,spanGaps:true});
      if(M.unit)   ds.push({type:'line',label:`${fl} ${CUR[ST.cur].sym}/kg ${lab}`,data:fn(unitRatioG(s[fk].v,s[fk].w)),yAxisID:'yP',borderColor:DCOL[fk].unit,borderWidth:1.2,borderDash:d2,pointRadius:0,tension:.2,order:1,spanGaps:true});
    });

    const co=compObj(), f=finOf(co);

    if(ST.fin.op){ const fs=finSeries(co,'op');
      if(fs) ds.push({type:'line',label:'영업이익(실적)',data:fs.map(x=>x==null?null:x*k),yAxisID:'yV',borderColor:'#ff9e80',borderWidth:1.8,borderDash:[6,3],pointRadius:2.5,pointBackgroundColor:'#ff9e80',tension:.15,spanGaps:true,order:0}); }
    if(ST.fin.seg&&f&&f.segq){ const fs=finSeries(co,'seg');
      if(fs) ds.push({type:'line',label:(f.segname||'세그먼트')+'(실적)',data:fs.map(x=>x==null?null:x*k),yAxisID:'yV',borderColor:'#e91e63',borderWidth:2.2,pointRadius:3,pointStyle:'triangle',pointBackgroundColor:'#e91e63',tension:.15,spanGaps:true,order:0}); }

}

function dMetrics(code){
  const s=dseries(code), av=aggLevel(s.exp.v), aiv=aggLevel(s.imp.v), lbl=gLabels();
  const ie=lastIdx(av), ii=lastIdx(aiv), ye=yoyG(av), yi=yoyG(aiv);
  const ue=unitDispG(s.exp.v,s.exp.w), ui=unitDispG(s.imp.v,s.imp.w); let h='';
  if(ST.flow!=='imp'){ h+=`<div class="metric"><span class="val">${fmtV(av[ie])}</span>${chip(ye[ie])}<div class="lbl">Export · ${lbl[ie]||''}</div></div>`;
    if(ue[ie]!=null) h+=`<div class="metric"><span class="val">${fmtUnit(ue[ie])}</span><div class="lbl">Export 단가</div></div>`; }
  if(ST.flow!=='exp'){ h+=`<div class="metric"><span class="val">${fmtV(aiv[ii])}</span>${chip(yi[ii])}<div class="lbl">Import · ${lbl[ii]||''}</div></div>`;
    if(ui[ii]!=null) h+=`<div class="metric"><span class="val">${fmtUnit(ui[ii])}</span><div class="lbl">Import 단가</div></div>`; }
  return h;
}

// ---------- category helpers ----------
function catLabel(id){ const c=M.categories.find(x=>x.id===id); return c?c.label:id; }
function companiesIn(cat){
  if(cat==='watch'){ const w=getWatch();
    const reals=P.companies.filter(c=>w.stars.indexOf(c.id)>=0 && (c.region||'JP')===ST.region);
    const customs=w.custom.map(c=>Object.assign({_custom:true},c));
    return reals.concat(customs); }
  if(cat==='hubs') return P.companies.filter(c=>(c.region||'JP')===ST.region && c.is_hub);
  return P.companies.filter(c=> (c.region||'JP')===ST.region && (cat==='all'? !c.hid : c.category===cat));
}

function genConfig(co){
  const id=((co.ticker||co.name).replace(/[^A-Za-z0-9]/g,'').toUpperCase())||'NEWCO';
  const hs=(co.hs||'').split(',').map(s=>s.trim()).filter(Boolean);
  const cu=(co.customs||'').split(',').map(s=>s.trim()).filter(Boolean);
  const heads=[...new Set(hs.map(h=>h.slice(0,6)))];
  return `# ${co.name} (${co.ticker||''}) — Phalanx 프록시 config\n`+
    `# [fetcher jem_estat_fetch.py]  FETCH_PREFIXES += ${JSON.stringify(heads)}\n`+
    `#   PORT_ESTAT += ${cu.map(c=>`"50${c}":"${c}"`).join(', ')||'(없음)'}  → 그리고 재fetch\n`+
    `# [builder jem_site_build.py]\n`+
    `# HS_SETS["${id}_core"] = {"pat": ${JSON.stringify(hs)}, "label": "Core · ${co.item||id}", "list": ${JSON.stringify(hs)}}\n`+
    `# PORTS += ${cu.map(c=>`{"code":"${c}","name":"","jp":"","region":"${co.catLabel||co.category}"}`).join(', ')||'(기존 세관 사용)'}\n`+
    `# COMPANIES += {"id":"${id}","name":"${co.name}","name_jp":"","ticker":"${co.ticker||''}","category":"${co.category}","subcategory":"${co.item||''}","item":"${co.item||''}","color":"#a0d911","core_set":"${id}_core","broad_set":"${id}_core","ports":${JSON.stringify(cu)},"main_ports":${JSON.stringify(cu)}}`;
}

// render a grid of company cards (real -> full card+charts+star+click; custom -> stub)
function renderCards(list,g){
  list.forEach(co=>{
    if(co._custom){ g.appendChild(stubCard(co)); return; }
    const card=companyCard(co); g.appendChild(card); renderCompanyCharts(card,co);
    const sb=card.querySelector('[data-star]'); if(sb) sb.onclick=(e)=>{e.stopPropagation();toggleStar(co.id);sb.classList.toggle('on',isStar(co.id));if(ST.cat==='watch'||ST.tab==='watch')render();};

}

  rr.style.display=(ST.view==='overview'&&ST.tab==='dash')?'flex':'none';
  rr.innerHTML='';
  [['B2C','B2C 소비자'],['B2B','B2B 산업재']].forEach(([biz,glabel])=>{
    const grp=REGIONS.filter(r=>biz==='B2C' ? r.biz==='B2C' : r.biz!=='B2C');
    if(!grp.length) return;
    const gwrap=document.createElement('span'); gwrap.className='reggrp'+(grp.some(r=>r.id===ST.region)?' cur':'');
    const gl=document.createElement('span'); gl.className='reggrp-l'; gl.textContent=glabel; gwrap.appendChild(gl);
    grp.forEach(r=>{ const el=document.createElement('span');
      el.className='regbtn'+(r.id===ST.region?' on':'');
      el.innerHTML=`<span class="rf">${r.flag||''}</span>${r.label}`+(r.loaded===false?`<span class="rwait">⏳ 데이터 대기</span>`:'');
      el.onclick=()=>{ if(ST.region===r.id) return;
        loadRegion(r.id, ()=>{ ST.region=r.id; ST.cat='all'; ST.company=null; ST.view='overview'; ST.q='';
          const qq=document.getElementById('q'); if(qq) qq.value=''; applyRegion(); buildCurRow(); render(); window.scrollTo(0,0); }); };
      gwrap.appendChild(el); });

}
function buildCurRow(){ const row=document.getElementById('curRow'); if(!row) return;
  row.querySelectorAll('.pill.cur').forEach(p=>p.remove());
  const anchor=row.querySelector('#q');
  Object.keys(CUR).forEach(k=>{ const el=document.createElement('span');
    el.className='pill cur'+(k===ST.cur?' on':''); el.dataset.cur=k;
    el.textContent=`${CUR[k].sym} ${k}`; el.onclick=()=>{ST.cur=k;render();};
    row.insertBefore(el,anchor); });
}
function render(){
  destroyAll();

  savePrefs();

function renderOverview(){
  destroyAll();
  document.getElementById('catRow').style.display='';
  document.getElementById('q').placeholder='기업 검색…';
  document.getElementById('crumb').innerHTML=
    `<b>${regionObj().label}</b><span class="sep">›</span><span>${regionObj().sector}</span>`+
    (ST.cat!=='all'?`<span class="sep">›</span><b>${catLabel(ST.cat)}</b>`:'');
  const cr=document.getElementById('catRow'); cr.innerHTML='';
  (regionObj().cats||M.categories).forEach(c=>{ const n=companiesIn(c.id).length;
    const el=document.createElement('span'); el.className='pill'+(c.id===ST.cat?' on':'')+(n===0&&c.id!=='all'?' empty':'');
    el.textContent=c.label+(n?` ${n}`:''); el.onclick=()=>{ST.cat=c.id;ST.ovN=30;render();}; cr.appendChild(el); });
  const q=ST.q.toLowerCase();
  let list=companiesIn(ST.cat).filter(c=>!q||c.name.toLowerCase().includes(q)||(c.name_jp||'').includes(ST.q)||(c.subcategory||'').includes(ST.q)||(c.ticker||'').toLowerCase().includes(q)||(c.note||'').toLowerCase().includes(q));
  const total=list.length;
  document.getElementById('cnt').textContent=`${total} companies · ${catLabel(ST.cat)}`;
  const main=document.getElementById('main'); main.innerHTML='';
  if(!list.length){ main.innerHTML='<div class="empty-msg">'+(ST.cat==='watch'?'아직 관심 기업이 없습니다. 카드의 ★ 를 누르거나 “관심기업 추가” 탭에서 등록하세요.':'이 카테고리는 데이터 준비중입니다. (현재 테스트/OSAT · 프로브카드 · JEM 만 제공)')+'</div>'; return; }
  // large regions (TWX 전수 등): 매출순 정렬 + 상위 N 렌더 (더 보기로 증분)
  if(total>60){
    const li=a=>{for(let i=a.length-1;i>=0;i--)if(a[i]>0)return i;return -1;};
    list=list.slice().sort((a,b)=>{const x=li(a.revenue),y=li(b.revenue);return (y>=0?b.revenue[y]:0)-(x>=0?a.revenue[x]:0);});
    const lim=ST.ovN||30;
    if(total>lim) { var _ovRest=total-lim; list=list.slice(0,lim); }
  }
  const g=document.createElement('div'); g.className='ov-grid'; main.appendChild(g);
  renderCards(list,g);
  if(typeof _ovRest!=='undefined'&&_ovRest>0){
    const mb=document.createElement('div');
    mb.className='empty-msg'; mb.style.cursor='pointer'; mb.style.marginTop='12px';
    mb.textContent=`▼ 더 보기 (+${Math.min(30,_ovRest)} / 남은 ${_ovRest}곳 — 매출순)`;
    mb.onclick=()=>{ST.ovN=(ST.ovN||30)+30;renderOverview();};
    main.appendChild(mb);
  }
}

// ---------- time-range control (presets + drag brush) ----------
function applyRange(){ const mn=xMin(), mx=xMax(); for(const k in charts){ if(k.endsWith('_y')||k.endsWith('_m'))continue; const c=charts[k]; const sx=c&&c.options&&c.options.scales&&c.options.scales.x; if(sx){ sx.min=mn; sx.max=mx; c.update('none'); } } }
function updateRangeUI(){ document.querySelectorAll('.pill.r').forEach(p=>p.classList.toggle('on',p.dataset.range===ST.range)); }
function positionBrush(){ const N=MONTHS.length-1, w=document.getElementById('brushWin'); if(!w||N<=0)return; w.style.left=(ST.r0/N*100)+'%'; w.style.width=((ST.r1-ST.r0)/N*100)+'%'; }
function setPreset(p){ const N=MONTHS.length-1; let r0=0;
  if(p==='3m')r0=N-2; else if(p==='6m')r0=N-5; else if(p==='1y')r0=N-11; else if(p==='3y')r0=N-35; else if(p==='5y')r0=N-59; else if(p==='10y')r0=N-119;
  else if(p==='ytd'){ const ji=MONTHS.indexOf(MONTHS[N].slice(0,4)+'-01'); r0=ji>=0?ji:0; } else r0=0;
  ST.r0=Math.max(0,r0); ST.r1=N; ST.range=p; updateRangeUI(); positionBrush(); applyRange(); }
function drawBrushSpark(){ const c=document.querySelector('#brush canvas'); if(!c)return; const r=c.getBoundingClientRect(); if(!r.width)return;
  const dpr=window.devicePixelRatio||1; c.width=Math.round(r.width*dpr); c.height=Math.round(r.height*dpr); const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,r.width,r.height);
  const _co=ST.company?compObj():(P.companies.find(c=>(c.region||'JP')===ST.region)||P.companies[0]); if(!_co)return; const fl=_co.rev_flow||'exp'; const _bp=(_co.total_ports&&_co.total_ports.length)?_co.total_ports:_co.ports; const s=(isF(_co)?fSum(_co,_co.ports,fl):sumDetail(_co.core_set,_bp)[fl]).v, n=s.length, mx=Math.max.apply(null,s)||1;
  ctx.beginPath(); ctx.strokeStyle='rgba(61,139,253,.55)'; ctx.lineWidth=1;
  for(let i=0;i<n;i++){ const x=i/(n-1)*r.width, y=r.height-(s[i]/mx)*(r.height-5)-3; i?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.stroke(); }
let _drag=null;
function _idx(x){ const r=document.getElementById('brush').getBoundingClientRect(); let f=(x-r.left)/r.width; f=Math.max(0,Math.min(1,f)); return Math.round(f*(MONTHS.length-1)); }
function initBrush(){
  document.querySelectorAll('.pill.r').forEach(p=>p.onclick=()=>setPreset(p.dataset.range));
  const win=document.getElementById('brushWin');
  win.addEventListener('pointerdown',e=>{ const m=e.target.classList.contains('bh-l')?'l':e.target.classList.contains('bh-r')?'r':'win';
    _drag={m,i0:_idx(e.clientX),r0:ST.r0,r1:ST.r1}; try{e.target.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  window.addEventListener('pointermove',e=>{ if(!_drag)return; const N=MONTHS.length-1, idx=_idx(e.clientX);
    if(_drag.m==='l') ST.r0=Math.max(0,Math.min(idx,ST.r1-1));
    else if(_drag.m==='r') ST.r1=Math.min(N,Math.max(idx,ST.r0+1));
    else { const wlen=_drag.r1-_drag.r0; let nr0=_drag.r0+(idx-_drag.i0); nr0=Math.max(0,Math.min(nr0,N-wlen)); ST.r0=nr0; ST.r1=nr0+wlen; }
    ST.range='custom'; updateRangeUI(); positionBrush(); applyRange(); });
  window.addEventListener('pointerup',()=>{_drag=null;});
  window.addEventListener('resize',()=>{drawBrushSpark();positionBrush();});
  drawBrushSpark(); positionBrush(); updateRangeUI();
}

// ---------- events ----------
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ST.tab=t.dataset.tab;ST.view='overview';ST.company=null;ST.q='';document.getElementById('q').value='';render();window.scrollTo(0,0);});
let qt; document.getElementById('q').addEventListener('input',e=>{clearTimeout(qt);qt=setTimeout(()=>{ST.q=e.target.value; ST.view==='detail'?renderDetail(): ST.view==='country'?renderCountry(): (ST.tab==='dash'?filterOverview():render());},180);});

 `<b>Methodology.</b> Customs export proxy for companies, built from Japan e-Stat <code>税関別品別国別表</code>

function renderHsInfo(){ const el=document.getElementById('hsinfo'); if(!el)return;
  const hs=REGHS[ST.region]; if(!hs||!hs.length){ el.innerHTML=''; el.style.display='none'; return; }
  el.innerHTML=`<div class="hdr">HS CODE · 설명 · 아이템 매핑</div>`+
    `<table><thead><tr><th>HS CODE</th><th>설명</th><th>매핑</th></tr></thead><tbody>`+
    hs.map(h=>`<tr class="${h.tier}"><td><span class="code">${h.code}</span><div class="full">${h.full}</div></td><td>${h.desc}</td><td class="mp">${h.map}</td></tr>`).join('')+
    `</tbody></table>`; }

loadPrefs(); applyHash();                      // resolves region; company re-resolves after shard load
loadRegion(ST.region, ()=>{ applyHash(); applyRegion(); buildCurRow(); render(); initBrush(); renderHsInfo(); });
window.addEventListener('popstate',()=>{ applyHash(); loadRegion(ST.region, ()=>{ applyHash(); applyRegion(); buildCurRow(); render(); window.scrollTo(0,0); }); });
