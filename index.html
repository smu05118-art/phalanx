<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>Phalanx · Japan Trade Dashboard</title>
<style>
:root{--bg:#06060e;--s1:#0d0d1a;--s2:#141428;--bd:#28284a;--tx:#e8e8f4;--dim:#6a6a9a;--a1:#00e6b8;--a2:#3d8bfd;--a3:#ff5c5c;--a4:#ffbe2e;--a5:#c45cff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;}
.app{max-width:1820px;margin:0 auto;padding:14px 14px 80px;}
header{display:flex;align-items:center;gap:10px;padding:6px 2px 12px;}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:10px;display:grid;place-items:center;font-size:16px;font-weight:900;color:#04121b;flex-shrink:0;}
header h1{font-size:16px;font-weight:800;letter-spacing:-.3px;}
header h1 em{color:var(--a1);font-style:normal;}
.sub{color:var(--dim);font-size:10px;font-family:monospace;margin-top:2px;}

.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;margin:2px 2px 12px;color:var(--dim);}
.crumb b{color:var(--tx);font-weight:700;}
.crumb .cl{cursor:pointer;color:var(--a2);}
.crumb .cl:hover{text-decoration:underline;}
.crumb .sep{color:var(--bd);}

.ctrl{position:sticky;top:0;z-index:20;background:var(--bg);padding:6px 0 8px;border-bottom:1px solid var(--bd);margin-bottom:10px;}
.row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center;}
.row:last-child{margin-bottom:0;}
.lbl-sm{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-right:3px;font-weight:700;}
.pill{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);white-space:nowrap;transition:.15s;user-select:none;-webkit-user-select:none;font-family:inherit;}
.pill:hover{border-color:var(--a2);}
.pill.on{color:#000;border-color:var(--a1);background:var(--a1);}
.pill.cur.on{background:var(--a4);border-color:var(--a4);color:#000;}
.pill.b.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.pill.y.on{background:var(--a4);border-color:var(--a4);color:#000;}
.pill.empty{opacity:.4;}
.cats{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cats::-webkit-scrollbar{display:none;}
.search{flex:1;min-width:120px;max-width:240px;padding:7px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:13px;font-family:inherit;outline:none;}
.search:focus{border-color:var(--a1);}
.back{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--a1);}
.back:hover{border-color:var(--a1);}

.cnt{font-size:10px;color:var(--dim);margin:8px 0 8px 2px;}
.ov-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:760px){.ov-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1240px){.ov-grid{grid-template-columns:1fr 1fr 1fr;}}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;overflow:hidden;}
.card.co{cursor:pointer;transition:.15s;}
.card.co:hover{border-color:var(--a1);transform:translateY(-2px);}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-hd h3{font-size:15px;font-weight:800;line-height:1.2;}
.card-hd h3 small{color:var(--dim);font-weight:600;font-size:11px;}
.co-cat{margin-top:4px;font-size:11px;font-weight:700;color:var(--a2);}
.cat-tag{font-size:10px;font-weight:800;padding:4px 9px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--a4);white-space:nowrap;flex-shrink:0;}
.headline{display:flex;align-items:baseline;gap:14px;margin:12px 0 4px;flex-wrap:wrap;}
.headline .big{font-size:24px;font-weight:800;font-family:monospace;letter-spacing:-.5px;}
.headline .chg{font-size:13px;font-weight:700;}
.headline .clab{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:2px;}
.rev-lab{font-size:10px;color:var(--dim);margin-bottom:8px;}
.up{color:var(--a1);}.dn{color:var(--a3);}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:10px;color:var(--dim);margin:4px 0 4px;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:14px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block;}
.legend i.bar{width:11px;height:11px;border-radius:2px;border:0;}
.ch-main{height:240px;position:relative;}
.ch-main canvas{display:block;width:100%!important;height:100%!important;}
.divid{border-top:1px solid var(--bd);margin:14px 0 8px;}
.sub-ttl{font-size:12px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.ch-yr{height:190px;position:relative;}
.ch-yr canvas{display:block;width:100%!important;height:100%!important;}

/* detail view */
.hero{margin:2px 0 14px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1080px){.grid{grid-template-columns:1fr 1fr 1fr;}}
.card.hero{border-color:var(--a1);}
.card.hero .card-hd h3{font-size:15px;}
.metrics{display:flex;gap:14px;margin:8px 0;flex-wrap:wrap;align-items:baseline;}
.metric .val{font-size:14px;font-weight:800;font-family:monospace;}
.metric .lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.metric .chg{font-size:10px;font-weight:700;margin-left:4px;}
.ch-wrap{height:200px;position:relative;}
.card.hero .ch-wrap{height:300px;}
.ch-wrap canvas{display:block;width:100%!important;height:100%!important;}
.cat-tag.Kyushu{color:var(--a4);}.cat-tag.Kansai{color:var(--a5);}
.empty-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px;border:1px dashed var(--bd);border-radius:12px;}
.foot{margin-top:22px;padding-top:12px;border-top:1px solid var(--bd);font-size:10px;color:var(--dim);line-height:1.7;}
.foot code{background:var(--s2);padding:1px 5px;border-radius:4px;color:var(--a1);}
.load-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px;}
.tabs{display:flex;gap:6px;margin:2px 2px 10px;}
.tab{padding:7px 15px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);}
.tab:hover{border-color:var(--a2);}
.tab.on{background:var(--a1);border-color:var(--a1);color:#04121b;}
.star{cursor:pointer;font-size:17px;line-height:1;background:none;border:0;color:var(--bd);padding:0 2px;transition:.15s;}
.star:hover{color:var(--a4);}
.star.on{color:var(--a4);}
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px;}
.panel h2{font-size:14px;font-weight:800;margin-bottom:12px;}
.add-form{display:grid;grid-template-columns:minmax(120px,1.2fr) minmax(100px,1fr) minmax(120px,1fr) minmax(120px,1.4fr) auto;gap:6px;width:100%;align-items:center;}
.add-input,.add-select{padding:8px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:12px;font-family:inherit;outline:none;min-width:0;}
.add-input:focus,.add-select:focus{border-color:var(--a1);}
.add-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--a1);background:var(--a1);color:#04121b;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.add-status{min-height:14px;font-size:11px;color:var(--dim);margin-top:8px;}
.add-status.err{color:var(--a3);}.add-status.ok{color:var(--a1);}
.watch-list{display:flex;gap:6px;flex-wrap:wrap;}
.watch-item{display:flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);font-size:12px;}
.watch-item b{font-weight:700;}.watch-item button{border:0;background:transparent;color:var(--dim);font-size:14px;line-height:1;cursor:pointer;}
.watch-item button:hover{color:var(--a3);}
.watch-empty{font-size:12px;color:var(--dim);padding:6px 2px;}
.card.stub{border:1px dashed var(--bd);}
@media(max-width:680px){.add-form{grid-template-columns:1fr 1fr;}.add-btn{grid-column:1/-1;}}
</style>
</head>

// ---------- watchlist (localStorage) ----------
const WKEY='phalanx_watch_v1';
function getWatch(){ try{return JSON.parse(localStorage.getItem(WKEY))||{stars:[],custom:[]};}catch(e){return {stars:[],custom:[]};} }
function setWatch(w){ try{localStorage.setItem(WKEY,JSON.stringify(w));}catch(e){} }
function isStar(id){ return getWatch().stars.indexOf(id)>=0; }
function toggleStar(id){ const w=getWatch(); const i=w.stars.indexOf(id); if(i<0)w.stars.push(id); else w.stars.splice(i,1); setWatch(w); }
function addCustom(c){ const w=getWatch(); w.custom.push(c); setWatch(w); }
function removeWatch(id){ const w=getWatch(); w.stars=w.stars.filter(x=>x!==id); w.custom=w.custom.filter(c=>c.id!==id); setWatch(w); }

// ---------- helpers ----------
function destroyAll(){ for(const k in charts){ try{charts[k].destroy();}catch(e){} delete charts[k]; } }
function fmtV(v){ if(v==null) return '–'; const c=CUR[ST.cur]; const x=v*c.mult, a=Math.abs(x);
  let s; if(a>=1e9)s=(x/1e9).toFixed(1)+'B'; else if(a>=1e6)s=(x/1e6).toFixed(1)+'M'; else if(a>=1e3)s=(x/1e3).toFixed(0)+'k'; else s=x.toFixed(0);
  return c.sym+s; }
function fmtP(v){ return v==null?'–':(v>=0?'+':'')+(v*100).toFixed(1)+'%'; }
function yoyArr(a){ return a.map((v,i)=> (i>=12 && a[i-12]>0)? v/a[i-12]-1 : null); }
function momArr(a){ return a.map((v,i)=> (i>=1 && a[i-1]>0)? v/a[i-1]-1 : null); }
function yoy3Arr(a){ const r=a.map((v,i)=>i<2?null:a[i]+a[i-1]+a[i-2]); return r.map((v,i)=>(i>=12&&r[i-12]>0)?r[i]/r[i-12]-1:null); }
function lastIdx(a){ for(let i=a.length-1;i>=0;i--) if(a[i]!=null && a[i]!==0) return i; return a.length-1; }
function mlabel(ym){ return ym.slice(2,4)+'/'+ym.slice(5,7); }
function chip(v){ if(v==null) return ''; return `<span class="chg ${v>=0?'up':'dn'}">${fmtP(v)}</span>`; }
const monthIdx = {}; MONTHS.forEach((m,i)=>monthIdx[m]=i);

// ---------- company overview card ----------
function companyCard(co){
  const rev=co.revenue, yo=yoyArr(rev), mo=momArr(rev), L=lastIdx(rev);
  const div=document.createElement('div');
  div.className='card co'; div.dataset.co=co.id;
  div.innerHTML=`

      <div><h3>${co.name} <small>${co.name_jp} · ${co.ticker}</small></h3>
        <div class="co-cat">Category · ${catLabel(co.category)}</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">

    <div class="headline">
      <div><div class="big">${fmtV(rev[L])}</div><span class="clab">${mlabel(MONTHS[L])} Revenue proxy</span></div>

    const arr=[]; for(let m=1;m<=12;m++){ const key=y+'-'+String(m).padStart(2,'0'); const i=monthIdx[key]; arr.push(i==null?null:yb[i]); }
    const col=YEAR_COLORS[y]||'#888';
    return {type:'line',label:"'"+String(y).slice(2),data:arr,borderColor:col,backgroundColor:col,borderWidth:1.8,pointRadius:2.2,pointHoverRadius:4,tension:.35,spanGaps:true};
  });
  charts[co.id+'_y']=new Chart(c2,{type:'line',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,labels:{color:'#6a6a9a',boxWidth:10,font:{size:9},usePointStyle:true,pointStyle:'circle'}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtP(c.parsed.y)}}},
      scales:{x:{ticks:{color:'#4a4a72',font:{size:8}},grid:{display:false}},
        y:{ticks:{color:'#4a4a72',font:{size:8},callback:v=>(v*100).toFixed(0)+'%'},grid:{color:'rgba(40,40,74,.45)'}}}}});
}

// ---------- detail (per-port) ----------
function dseries(code){ const s=P.detail[ST.mode][code]; return {exp:s.exp.slice(),imp:s.imp.slice()}; }
function dDatasets(code){
  const s=dseries(code), showE=ST.flow!=='imp', showI=ST.flow!=='exp', m=ST.metrics, ds=[];
  const cv=a=>a.map(v=>v==null?null:v*CUR[ST.cur].mult);
  if(m.value){
    if(showE) ds.push({type:'bar',label:'Export',data:cv(s.exp),yAxisID:'y',backgroundColor:'rgba(61,139,253,.45)',borderColor:'rgba(61,139,253,.9)',borderWidth:0,order:5,barPercentage:1,categoryPercentage:.95});
    if(showI) ds.push({type:'line',label:'Import',data:cv(s.imp),yAxisID:'y',borderColor:'#00e6b8',borderWidth:1.6,pointRadius:0,tension:.25,order:4});
  }
  if(m.yoy){
    if(showE) ds.push({type:'line',label:'Export YoY%',data:yoyArr(s.exp),yAxisID:'y1',borderColor:'#ffbe2e',borderWidth:1.3,borderDash:[5,4],pointRadius:0,tension:.25,order:2,spanGaps:true});
    if(showI) ds.push({type:'line',label:'Import YoY%',data:yoyArr(s.imp),yAxisID:'y1',borderColor:'#c45cff',borderWidth:1.3,borderDash:[5,4],pointRadius:0,tension:.25,order:1,spanGaps:true});
  }
  if(m.yoy3){
    if(showE) ds.push({type:'line',label:'Export 3M YoY%',data:yoy3Arr(s.exp),yAxisID:'y1',borderColor:'#ff8a3d',borderWidth:1.7,borderDash:[2,3],pointRadius:0,tension:.25,order:3,spanGaps:true});
    if(showI) ds.push({type:'line',label:'Import 3M YoY%',data:yoy3Arr(s.imp),yAxisID:'y1',borderColor:'#9b8cff',borderWidth:1.7,borderDash:[2,3],pointRadius:0,tension:.25,order:3,spanGaps:true});
  }
  return ds;
}
function dOpts(){ const m=ST.metrics, valueOn=m.value, pctOn=m.yoy||m.yoy3;
  return {responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,labels:{color:'#6a6a9a',boxWidth:10,font:{size:9}}},
      tooltip:{callbacks:{label:c=>{const pct=c.dataset.yAxisID==='y1'; return c.dataset.label+': '+(pct?fmtP(c.parsed.y):fmtV(c.parsed.y/CUR[ST.cur].mult));}}}},
    scales:{x:{ticks:{color:'#4a4a72',maxTicksLimit:8,font:{size:8}},grid:{display:false}},
      y:{display:valueOn,position:'left',beginAtZero:true,ticks:{color:'#4a4a72',font:{size:8},callback:v=>fmtV(v/CUR[ST.cur].mult)},grid:{color:'rgba(40,40,74,.5)'}},
      y1:{display:pctOn,position:'right',ticks:{color:'#4a4a72',font:{size:8},callback:v=>(v*100).toFixed(0)+'%'},grid:{display:false}}}};
}
function dMetrics(code){
  const s=dseries(code), ie=lastIdx(s.exp), ii=lastIdx(s.imp), ye=yoyArr(s.exp), yi=yoyArr(s.imp); let h='';
  if(ST.flow!=='imp') h+=`<div class="metric"><span class="val">${fmtV(s.exp[ie])}</span>${chip(ye[ie])}<div class="lbl">Export · ${mlabel(MONTHS[ie])}</div></div>`;
  if(ST.flow!=='exp') h+=`<div class="metric"><span class="val">${fmtV(s.imp[ii])}</span>${chip(yi[ii])}<div class="lbl">Import · ${mlabel(MONTHS[ii])}</div></div>`;
  return h;
}
function dCard(p,hero){
  const div=document.createElement('div'); div.className='card'+(hero?' hero':''); div.dataset.code=p.code;
  const tag=p.region?`<span class="cat-tag ${p.region}">${p.region}</span>`:'';
  div.innerHTML=`<div class="card-hd"><div><h3>${p.name}${p.jp?` <small>${p.jp}</small>`:''}</h3>
    <div class="co-cat">${hero?'All 8 JEM ports':'Customs '+p.code}</div></div>${tag}</div>
    <div class="metrics">${dMetrics(p.code)}</div><div class="ch-wrap"><canvas></canvas></div>`;
  return div;
}
function renderDCard(div){ const code=div.dataset.code;
  charts['d_'+code]=new Chart(div.querySelector('canvas'),{data:{labels:MONTHS,datasets:dDatasets(code)},options:dOpts()}); }

// ---------- category helpers ----------
function catLabel(id){ const c=M.categories.find(x=>x.id===id); return c?c.label:id; }
function companiesIn(cat){
  if(cat==='watch'){ const w=getWatch();
    const reals=P.companies.filter(c=>w.stars.indexOf(c.id)>=0);
    const customs=w.custom.map(c=>Object.assign({_custom:true},c));
    return reals.concat(customs); }
  return P.companies.filter(c=> cat==='all'||c.category===cat);
}

// stub card for a user-added company with no customs data yet
function stubCard(co){
  const div=document.createElement('div'); div.className='card stub';
  div.innerHTML=`<div class="card-hd"><div><h3>${co.name} ${co.ticker?`<small>${co.ticker}</small>`:''}</h3>
      <div class="co-cat">Category · ${catLabel(co.category)}</div></div>
      <span class="cat-tag">${catLabel(co.category)}</span></div>
    <div class="empty-msg" style="margin-top:12px">데이터 연동 대기 — HS·세관 코드를 빌더에 추가하면 차트가 채워집니다.${co.note?`<br><span style="color:var(--a2)">메모: ${co.note}</span>`:''}</div>
    <div style="margin-top:10px;text-align:right"><button class="back" data-rm="${co.id}">관심 해제</button></div>`;
  div.querySelector('[data-rm]').onclick=()=>{removeWatch(co.id);render();};
  return div;
}

// render a grid of company cards (real -> full card+charts+star+click; custom -> stub)
function renderCards(list,g){
  list.forEach(co=>{
    if(co._custom){ g.appendChild(stubCard(co)); return; }
    const card=companyCard(co); g.appendChild(card); renderCompanyCharts(card,co);
    const sb=card.querySelector('[data-star]'); if(sb) sb.onclick=(e)=>{e.stopPropagation();toggleStar(co.id);render();};
    card.onclick=()=>{ST.view='detail';ST.company=co.id;ST.q='';document.getElementById('q').value='';render();window.scrollTo(0,0);};
  });
}

// ---------- renderers ----------
function render(){
  destroyAll();
  document.getElementById('sub').textContent=`Monthly · ${mlabel(MONTHS[0])}–${mlabel(M.updated)} · ${M.source}`;
  document.querySelectorAll('.pill.cur').forEach(p=>p.classList.toggle('on',p.dataset.cur===ST.cur));
  const tabs=document.getElementById('tabs');
  if(ST.view==='detail'){ tabs.style.display='none'; return renderDetail(); }
  tabs.style.display='flex';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===ST.tab));
  if(ST.tab==='watch') return renderWatch();
  renderOverview();
}

function renderOverview(){
  document.getElementById('catRow').style.display='';
  document.getElementById('q').placeholder='기업 검색…';
  document.getElementById('crumb').innerHTML=
    `<b>일본 수출입</b><span class="sep">›</span><span>일본 테크</span>`+
    (ST.cat!=='all'?`<span class="sep">›</span><b>${catLabel(ST.cat)}</b>`:'');
  const cr=document.getElementById('catRow'); cr.innerHTML='';
  M.categories.forEach(c=>{ const n=companiesIn(c.id).length;
    const el=document.createElement('span'); el.className='pill'+(c.id===ST.cat?' on':'')+(n===0&&c.id!=='all'?' empty':'');
    el.textContent=c.label+(n?` ${n}`:''); el.onclick=()=>{ST.cat=c.id;render();}; cr.appendChild(el); });
  const q=ST.q.toLowerCase();
  let list=companiesIn(ST.cat).filter(c=>!q||c.name.toLowerCase().includes(q)||(c.name_jp||'').includes(ST.q)||(c.subcategory||'').includes(ST.q));
  document.getElementById('cnt').textContent=`${list.length} companies · ${catLabel(ST.cat)}`;
  const main=document.getElementById('main'); main.innerHTML='';
  if(!list.length){ main.innerHTML='<div class="empty-msg">'+(ST.cat==='watch'?'아직 관심 기업이 없습니다. 카드의 ★ 를 누르거나 “관심기업 추가” 탭에서 등록하세요.':'이 카테고리는 데이터 준비중입니다. (현재 테스트/OSAT · 프로브카드 · JEM 만 제공)')+'</div>'; return; }
  const g=document.createElement('div'); g.className='ov-grid'; main.appendChild(g);
  renderCards(list,g);
}

function renderWatch(){
  document.getElementById('catRow').style.display='none';
  document.getElementById('q').placeholder='기업 검색…';
  document.getElementById('crumb').innerHTML=`<b>일본 수출입</b><span class="sep">›</span><span>관심 Company</span>`;
  document.getElementById('cnt').textContent='';
  const cats=M.categories.filter(c=>c.id!=='all'&&c.id!=='watch');
  const main=document.getElementById('main');
  main.innerHTML=`
    <div class="panel">
      <h2>관심기업 추가</h2>
      <div class="add-form">
        <input class="add-input" id="f_name" placeholder="기업명 (예: Advantest)">
        <input class="add-input" id="f_ticker" placeholder="티커 (예: 6857 JP)">
        <select class="add-select" id="f_cat">${cats.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select>
        <input class="add-input" id="f_note" placeholder="메모 (선택)">
        <button class="add-btn" id="f_add">+ 추가</button>
      </div>
      <div class="add-status" id="f_status">관심 기업은 이 브라우저(localStorage)에 저장됩니다. 실데이터 연동은 HS·세관 코드 추가 후 다음 빌드에서 채워집니다.</div>
    </div>`;
  const items=companiesIn('watch');
  const mgr=document.createElement('div'); mgr.className='panel';
  mgr.innerHTML=`<h2>관심 목록 (${items.length})</h2>`+(items.length
    ? `<div class="watch-list">${items.map(c=>`<span class="watch-item"><b>${c.name}</b><span style="color:var(--dim)">${c.ticker||catLabel(c.category)}</span><button data-rm="${c.id}" title="제거">✕</button></span>`).join('')}</div>`
    : `<div class="watch-empty">아직 관심 기업이 없습니다. 대시보드 카드의 ★ 를 누르거나 위에서 직접 추가하세요.</div>`);
  main.appendChild(mgr);
  if(items.length){ const g=document.createElement('div'); g.className='ov-grid'; main.appendChild(g); renderCards(items,g); }
  document.getElementById('f_add').onclick=()=>{
    const name=document.getElementById('f_name').value.trim(), st=document.getElementById('f_status');
    if(!name){ st.className='add-status err'; st.textContent='기업명을 입력하세요.'; return; }
    addCustom({id:'c_'+Date.now(),name:name,name_jp:'',ticker:document.getElementById('f_ticker').value.trim(),category:document.getElementById('f_cat').value,note:document.getElementById('f_note').value.trim()});
    renderWatch();
  };
  mgr.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{removeWatch(b.dataset.rm);renderWatch();});
}

function renderDetail(){
  destroyAll();
  const co=P.companies.find(c=>c.id===ST.company);
  document.getElementById('catRow').style.display='none';
  document.getElementById('q').placeholder='세관 검색…';
  document.getElementById('crumb').innerHTML=
    `<span class="cl" data-go="ov">일본 수출입</span><span class="sep">›</span>`+
    `<span class="cl" data-go="ov">일본 테크</span><span class="sep">›</span>`+
    `<span class="cl" data-go="cat">${catLabel(co.category)}</span><span class="sep">›</span>`+
    `<span>${co.subcategory}</span><span class="sep">›</span><b>${co.name}</b>`+
    `<span style="flex:1"></span><span class="back" data-go="ov">← 개요로</span>`;
  document.querySelectorAll('#crumb [data-go]').forEach(e=>e.onclick=()=>{ if(e.dataset.go==='cat'){ST.cat=co.category;} ST.view='overview';ST.company=null;render();window.scrollTo(0,0); });
  // detail controls injected into cnt area
  document.getElementById('cnt').innerHTML=
    `<div class="row" style="margin:2px 0 4px">
       <span class="lbl-sm">HS</span>
       <span class="pill ${ST.mode==='core'?'on':''}" data-d="mode" data-v="core">Core · 903090000</span>
       <span class="pill ${ST.mode==='broad'?'on':''}" data-d="mode" data-v="broad">Broad · 4 HS</span>
       <span class="lbl-sm" style="margin-left:8px">View · 중복선택</span>
       <span class="pill y ${ST.metrics.value?'on':''}" data-m="value">Value</span>
       <span class="pill y ${ST.metrics.yoy?'on':''}" data-m="yoy">YoY%</span>
       <span class="pill y ${ST.metrics.yoy3?'on':''}" data-m="yoy3">3M YoY%</span>
       <span class="lbl-sm" style="margin-left:8px">Flow</span>
       <span class="pill b ${ST.flow==='exp'?'on':''}" data-d="flow" data-v="exp">Export</span>
       <span class="pill b ${ST.flow==='imp'?'on':''}" data-d="flow" data-v="imp">Import</span>
       <span class="pill b ${ST.flow==='both'?'on':''}" data-d="flow" data-v="both">Both</span>
     </div>`;
  document.querySelectorAll('#cnt [data-d]').forEach(e=>e.onclick=()=>{ST[e.dataset.d]=e.dataset.v;renderDetail();});
  document.querySelectorAll('#cnt [data-m]').forEach(e=>e.onclick=()=>{const k=e.dataset.m,nm=Object.assign({},ST.metrics);nm[k]=!nm[k];if(!nm.value&&!nm.yoy&&!nm.yoy3)nm[k]=true;ST.metrics=nm;renderDetail();});
  const main=document.getElementById('main');
  main.innerHTML='<div class="hero" id="hero"></div><div class="grid" id="grid"></div>';
  const hero=dCard({code:'ALL',name:co.name+' Total',jp:co.name_jp,region:''},true);
  document.getElementById('hero').appendChild(hero); renderDCard(hero);
  const q=ST.q.toLowerCase();
  const ports=M.ports.filter(p=>!q||p.name.toLowerCase().includes(q)||p.jp.includes(ST.q)||p.code.includes(q)||p.region.toLowerCase().includes(q));
  const grid=document.getElementById('grid');
  ports.forEach(p=>{const c=dCard(p,false);grid.appendChild(c);renderDCard(c);});
}

// ---------- events ----------
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ST.tab=t.dataset.tab;ST.view='overview';ST.company=null;ST.q='';document.getElementById('q').value='';render();window.scrollTo(0,0);});
document.querySelectorAll('.pill.cur').forEach(p=>p.onclick=()=>{ST.cur=p.dataset.cur;render();});
let qt; document.getElementById('q').addEventListener('input',e=>{clearTimeout(qt);qt=setTimeout(()=>{ST.q=e.target.value;ST.view==='detail'?renderDetail():renderOverview();},180);});

document.getElementById('foot').innerHTML=
 `<b>Methodology.</b> Customs export proxy for companies, built from Japan e-Stat <code>税関別品別国別表</code>
  (Trade Statistics by Customs × Commodity × Country), summed over all partner countries. Overview "Revenue" = total
  CORE-HS export across the company's ports; YoY% / MoM% / YoY-by-Year are derived from it. Click a company for the
  per-port breakdown (Core 903090000 vs Broad 4-HS, export/import). <b>JEM</b> (6855 JP) probe-card proxy concentrates
  at air ports (Kansai Air, Fukuoka Air). USD/KRW are approximate static conversions (¥ base). Not investment advice. Source: Japan Customs / e-Stat.`;

render();
</script>
