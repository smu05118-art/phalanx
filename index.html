<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
<title>Phalanx · Japan Trade Dashboard</title>
<style>
:root{--bg:#06060e;--s1:#0d0d1a;--s2:#141428;--bd:#28284a;--tx:#e8e8f4;--dim:#6a6a9a;--a1:#00e6b8;--a2:#3d8bfd;--a3:#ff5c5c;--a4:#ffbe2e;--a5:#c45cff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;}
.app{max-width:1820px;margin:0 auto;padding:14px 14px 80px;}
header{display:flex;align-items:center;gap:10px;padding:6px 2px 12px;}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:10px;display:grid;place-items:center;font-size:16px;font-weight:900;color:#04121b;flex-shrink:0;}
header h1{font-size:16px;font-weight:800;letter-spacing:-.3px;}
header h1 em{color:var(--a1);font-style:normal;}
.sub{color:var(--dim);font-size:10px;font-family:monospace;margin-top:2px;}

.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;margin:2px 2px 12px;color:var(--dim);}
.crumb b{color:var(--tx);font-weight:700;}
.crumb .cl{cursor:pointer;color:var(--a2);}
.crumb .cl:hover{text-decoration:underline;}
.crumb .sep{color:var(--bd);}

.ctrl{position:sticky;top:0;z-index:20;background:var(--bg);padding:6px 0 8px;border-bottom:1px solid var(--bd);margin-bottom:10px;}
.row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center;}
.row:last-child{margin-bottom:0;}
.lbl-sm{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-right:3px;font-weight:700;}
.pill{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);white-space:nowrap;transition:.15s;user-select:none;-webkit-user-select:none;font-family:inherit;}
.pill:hover{border-color:var(--a2);}
.pill.on{color:#000;border-color:var(--a1);background:var(--a1);}
.pill.cur.on{background:var(--a4);border-color:var(--a4);color:#000;}
.pill.b.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.pill.y.on{background:var(--a4);border-color:var(--a4);color:#000;}
.pill.empty{opacity:.4;}
.cats{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.cats::-webkit-scrollbar{display:none;}
.search{flex:1;min-width:120px;max-width:240px;padding:7px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:13px;font-family:inherit;outline:none;}
.search:focus{border-color:var(--a1);}
.back{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--a1);}
.back:hover{border-color:var(--a1);}

.cnt{font-size:10px;color:var(--dim);margin:8px 0 8px 2px;}
.ov-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:760px){.ov-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1240px){.ov-grid{grid-template-columns:1fr 1fr 1fr;}}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;overflow:hidden;}
.card.co{cursor:pointer;transition:.15s;}
.card.co:hover{border-color:var(--a1);transform:translateY(-2px);}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-hd h3{font-size:15px;font-weight:800;line-height:1.2;}
.card-hd h3 small{color:var(--dim);font-weight:600;font-size:11px;}
.co-cat{margin-top:4px;font-size:11px;font-weight:700;color:var(--a2);}
.cat-tag{font-size:10px;font-weight:800;padding:4px 9px;border-radius:5px;background:var(--s2);border:1px solid var(--bd);color:var(--a4);white-space:nowrap;flex-shrink:0;}
.headline{display:flex;align-items:baseline;gap:14px;margin:12px 0 4px;flex-wrap:wrap;}
.headline .big{font-size:24px;font-weight:800;font-family:monospace;letter-spacing:-.5px;}
.headline .chg{font-size:13px;font-weight:700;}
.headline .clab{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:2px;}
.rev-lab{font-size:10px;color:var(--dim);margin-bottom:8px;}
.up{color:var(--a1);}.dn{color:var(--a3);}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:10px;color:var(--dim);margin:4px 0 4px;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:14px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block;}
.legend i.bar{width:11px;height:11px;border-radius:2px;border:0;}
.ch-main{height:240px;position:relative;}
.ch-main canvas{display:block;width:100%!important;height:100%!important;}
.divid{border-top:1px solid var(--bd);margin:14px 0 8px;}
.sub-ttl{font-size:12px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.ch-yr{height:190px;position:relative;}
.ch-yr canvas{display:block;width:100%!important;height:100%!important;}

/* detail view */
.hero{margin:2px 0 14px;}
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1080px){.grid{grid-template-columns:1fr 1fr 1fr;}}
.card.hero{border-color:var(--a1);}
.card.hero .card-hd h3{font-size:15px;}
.metrics{display:flex;gap:14px;margin:8px 0;flex-wrap:wrap;align-items:baseline;}
.metric .val{font-size:14px;font-weight:800;font-family:monospace;}
.metric .lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.metric .chg{font-size:10px;font-weight:700;margin-left:4px;}
.ch-wrap{height:200px;position:relative;}
.card.hero .ch-wrap{height:300px;}
.ch-wrap canvas{display:block;width:100%!important;height:100%!important;}
.cat-tag.Kyushu{color:var(--a4);}.cat-tag.Kansai{color:var(--a5);}
.empty-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:13px;border:1px dashed var(--bd);border-radius:12px;}
.foot{margin-top:22px;padding-top:12px;border-top:1px solid var(--bd);font-size:10px;color:var(--dim);line-height:1.7;}
.foot code{background:var(--s2);padding:1px 5px;border-radius:4px;color:var(--a1);}
.load-msg{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px;}
.tabs{display:flex;gap:6px;margin:2px 2px 10px;}
.tab{padding:7px 15px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--s1);color:var(--dim);}
.tab:hover{border-color:var(--a2);}
.tab.on{background:var(--a1);border-color:var(--a1);color:#04121b;}
.star{cursor:pointer;font-size:17px;line-height:1;background:none;border:0;color:var(--bd);padding:0 2px;transition:.15s;}
.star:hover{color:var(--a4);}
.star.on{color:var(--a4);}
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px;}
.panel h2{font-size:14px;font-weight:800;margin-bottom:12px;}
.add-form{display:grid;grid-template-columns:minmax(120px,1.2fr) minmax(100px,1fr) minmax(120px,1fr) minmax(120px,1.4fr) auto;gap:6px;width:100%;align-items:center;}
.add-input,.add-select{padding:8px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--tx);font-size:12px;font-family:inherit;outline:none;min-width:0;}
.add-input:focus,.add-select:focus{border-color:var(--a1);}
.add-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--a1);background:var(--a1);color:#04121b;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.add-status{min-height:14px;font-size:11px;color:var(--dim);margin-top:8px;}
.add-status.err{color:var(--a3);}.add-status.ok{color:var(--a1);}
.watch-list{display:flex;gap:6px;flex-wrap:wrap;}
.watch-item{display:flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid var(--bd);border-radius:8px;background:var(--s2);font-size:12px;}
.watch-item b{font-weight:700;}.watch-item button{border:0;background:transparent;color:var(--dim);font-size:14px;line-height:1;cursor:pointer;}
.watch-item button:hover{color:var(--a3);}
.watch-empty{font-size:12px;color:var(--dim);padding:6px 2px;}
.card.stub{border:1px dashed var(--bd);}
.pill.r.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.brush{position:relative;height:44px;margin:5px 0 2px;border:1px solid var(--bd);border-radius:8px;background:var(--s1);overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
.brush canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
.brush-win{position:absolute;top:0;bottom:0;left:0;width:100%;background:rgba(61,139,253,.13);border-left:2px solid var(--a2);border-right:2px solid var(--a2);cursor:grab;box-sizing:border-box;}
.brush-win:active{cursor:grabbing;}
.bh{position:absolute;top:0;bottom:0;width:12px;cursor:ew-resize;background:rgba(61,139,253,.3);}
.bh-l{left:-2px;}.bh-r{right:-2px;}
.hsinfo{margin:8px 2px 2px;border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.hsinfo .hdr{font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;background:var(--s2);border-bottom:1px solid var(--bd);}
.hsinfo table{width:100%;border-collapse:collapse;font-size:11px;}
.hsinfo th{background:var(--s2);color:var(--dim);font-weight:700;text-align:left;padding:5px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.4px;}
.hsinfo td{padding:7px 10px;border-top:1px solid var(--bd);vertical-align:top;line-height:1.4;}
.hsinfo .code{font-family:monospace;font-weight:800;color:var(--a2);white-space:nowrap;}
.hsinfo tr.main .code{color:var(--a1);}
.hsinfo tr.main{background:rgba(0,230,184,.05);}
.hsinfo .full{font-family:monospace;font-size:9px;color:var(--dim);margin-top:2px;}
.hsinfo td.mp{color:var(--tx);}.hsinfo tr.main td.mp{color:var(--a1);font-weight:600;}
.port-map{font-size:10px;color:var(--dim);margin:0 0 8px;line-height:1.45;padding:6px 8px;background:var(--s2);border-radius:6px;border-left:2px solid var(--bd);}
.port-map b{color:var(--a2);font-weight:700;}
.port-map.main{border-left-color:var(--a1);}.port-map.main b{color:var(--a1);}
.pill.s.on{background:var(--a5);border-color:var(--a5);color:#fff;}
.pill.g.on{background:var(--a2);border-color:var(--a2);color:#fff;}
.pill.cm.on{background:var(--a5);border-color:var(--a5);color:#fff;}
.co-note{font-size:10px;line-height:1.5;color:var(--a4);background:rgba(255,190,46,.08);border:1px solid rgba(255,190,46,.25);border-radius:6px;padding:6px 9px;margin:2px 0 8px;}
.split-note{font-size:10px;color:var(--a5);margin:4px 2px 0;font-weight:600;}
@media(max-width:680px){.add-form{grid-template-columns:1fr 1fr;}.add-btn{grid-column:1/-1;}}
</style>
</head>

<header>

<div>

// ---------- watchlist (localStorage) ----------
const WKEY='phalanx_watch_v1';
function getWatch(){ try{return JSON.parse(localStorage.getItem(WKEY))||{stars:[],custom:[]};}catch(e){return {stars:[],custom:[]};} }
function setWatch(w){ try{localStorage.setItem(WKEY,JSON.stringify(w));}catch(e){} }
function isStar(id){ return getWatch().stars.indexOf(id)>=0; }
function toggleStar(id){ const w=getWatch(); const i=w.stars.indexOf(id); if(i<0)w.stars.push(id); else w.stars.splice(i,1); setWatch(w); }
function addCustom(c){ const w=getWatch(); w.custom.push(c); setWatch(w); }
function removeWatch(id){ const w=getWatch(); w.stars=w.stars.filter(x=>x!==id); w.custom=w.custom.filter(c=>c.id!==id); setWatch(w); }

// ---------- helpers ----------
function destroyAll(){ for(const k in charts){ try{charts[k].destroy();}catch(e){} delete charts[k]; } }
function fmtV(v){ if(v==null) return '–'; const c=CUR[ST.cur]; const x=v*c.mult, a=Math.abs(x);
  let s; if(a>=1e9)s=(x/1e9).toFixed(1)+'B'; else if(a>=1e6)s=(x/1e6).toFixed(1)+'M'; else if(a>=1e3)s=(x/1e3).toFixed(0)+'k'; else s=x.toFixed(0);
  return c.sym+s; }
function fmtP(v){ return v==null?'–':(v>=0?'+':'')+(v*100).toFixed(1)+'%'; }
function fmtNum(v){ if(v==null)return '–'; const a=Math.abs(v);
  if(a>=1e9)return (v/1e9).toFixed(1)+'B'; if(a>=1e6)return (v/1e6).toFixed(1)+'M';
  if(a>=1e3)return (v/1e3).toFixed(0)+'k'; return v.toFixed(0); }
function fmtKg(v){ return v==null?'–':fmtNum(v)+'kg'; }
function fmtUnit(v){ return v==null?'–':CUR[ST.cur].sym+fmtNum(v)+'/kg'; }
function yoyArr(a){ return a.map((v,i)=> (i>=12 && a[i-12]>0)? v/a[i-12]-1 : null); }
function momArr(a){ return a.map((v,i)=> (i>=1 && a[i-1]>0)? v/a[i-1]-1 : null); }
function yoy3Arr(a){ const r=a.map((v,i)=>i<2?null:a[i]+a[i-1]+a[i-2]); return r.map((v,i)=>(i>=12&&r[i-12]>0)?r[i]/r[i-12]-1:null); }
function lastIdx(a){ for(let i=a.length-1;i>=0;i--) if(a[i]!=null && a[i]!==0) return i; return a.length-1; }
function mlabel(ym){ return ym.slice(2,4)+'/'+ym.slice(5,7); }

function companyCard(co){

  div.innerHTML=`
    <div class="card-hd">
      <div><h3>${co.name} <small>${co.name_jp} · ${co.ticker}</small></h3>
        <div class="co-cat">Category · ${catLabel(co.category)}</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">

    </div>
    <div class="headline">

      <div>${chip(mo[L])}<span class="clab">MoM</span></div>

    ${co.note?`<div class="co-note">${co.note}</div>`:''}

// ---------- granularity (Monthly / Quarterly / Yearly) ----------
function periodInfo(g){ periodInfo._c=periodInfo._c||{}; if(periodInfo._c[g]) return periodInfo._c[g];
  let keys=[],m2p=[],label=[];
  if(g==='M'){ keys=MONTHS.slice(); m2p=MONTHS.map((_,i)=>i); label=MONTHS.map(mlabel); }
  else { const seen={};
    MONTHS.forEach(ym=>{ const y=ym.slice(0,4),mo=+ym.slice(5,7), key=g==='Q'?`${y}-Q${Math.ceil(mo/3)}`:y;
      if(!(key in seen)){ seen[key]=keys.length; keys.push(key); label.push(g==='Q'?y.slice(2)+'Q'+Math.ceil(mo/3):y); }
      m2p.push(seen[key]); }); }
  return periodInfo._c[g]={keys,m2p,label,n:keys.length,lag:g==='M'?12:g==='Q'?4:1};
}
function gInfo(){ return periodInfo(ST.gran); }
function gLabels(){ return gInfo().label; }
function xMin(){ return gInfo().m2p[ST.r0]; }
function xMax(){ return gInfo().m2p[ST.r1]; }
function aggLevel(arr){ if(ST.gran==='M') return arr; const pi=gInfo(),out=new Array(pi.n).fill(0); for(let i=0;i<arr.length;i++){ if(arr[i]!=null) out[pi.m2p[i]]+=arr[i]; } return out; }
function yoyG(level){ const lag=gInfo().lag; return level.map((v,i)=>(i>=lag&&level[i-lag]>0)?v/level[i-lag]-1:null); }
function yoy3G(level){ const lag=gInfo().lag,r=level.map((v,i)=>i<2?null:level[i]+level[i-1]+level[i-2]); return r.map((v,i)=>(i>=lag&&r[i-lag]>0)?r[i]/r[i-lag]-1:null); }

// ---------- company helpers (per-company port sets; "ALL" = sum of company ports) ----------
function compObj(){ return P.companies.find(c=>c.id===ST.company)||P.companies[0]; }
function compPorts(){ return compObj().ports; }
function sumDetail(mode, ports){ const n=MONTHS.length, z=()=>new Array(n).fill(0);
  const out={exp:{v:z(),w:z()},imp:{v:z(),w:z()}};
  ports.forEach(pc=>{ const s=P.detail[mode][pc]; if(!s)return; ['exp','imp'].forEach(f=>['v','w'].forEach(k=>{ const a=s[f][k]; for(let i=0;i<n;i++) out[f][k][i]+=a[i]; })); });
  return out; }

// ---------- detail (per-port): Value(¥) / Weight(kg) / Unit(¥/kg) x Level / YoY / 3p YoY ----------
function dseries(code){ const s = code==='ALL' ? sumDetail(ST.mode, compPorts()) : P.detail[ST.mode][code]; return {exp:{v:s.exp.v,w:s.exp.w}, imp:{v:s.imp.v,w:s.imp.w}}; }
const DCOL={exp:{value:'#3d8bfd',weight:'#ffbe2e',unit:'#c45cff'},imp:{value:'#00e6b8',weight:'#ff8a3d',unit:'#7da0ff'}};
function unitDispG(v,w){ const av=aggLevel(v),aw=aggLevel(w),k=CUR[ST.cur].mult; return av.map((x,i)=>aw[i]>0?x*k/aw[i]:null); }
function unitRatioG(v,w){ const av=aggLevel(v),aw=aggLevel(w); return av.map((x,i)=>aw[i]>0?x/aw[i]:null); }
function countryLoc(code){
  const cd=(P.country||{})[ST.mode]; if(!cd||!cd.loc) return {order:null,loc:{},locw:{}};
  if(code!=='ALL') return {order:cd.order, loc:cd.loc[code]||{}, locw:(cd.locw||{})[code]||{}};
  const n=MONTHS.length, lv={}, lw={}; cd.order.forEach(c=>{lv[c]=new Array(n).fill(0);lw[c]=new Array(n).fill(0);});
  compPorts().forEach(pc=>{ const l=cd.loc[pc], w=(cd.locw||{})[pc];
    if(l)cd.order.forEach(c=>{const a=l[c]||[];for(let i=0;i<n;i++)lv[c][i]+=(a[i]||0);});
    if(w)cd.order.forEach(c=>{const a=w[c]||[];for(let i=0;i<n;i++)lw[c][i]+=(a[i]||0);}); });
  return {order:cd.order, loc:lv, locw:lw};
}
// country value (¥) stacked-area datasets — used by the in-detail 수출국별 overlay
function countryDatasets(code){
  const {order,loc}=countryLoc(code); if(!order) return [];

  return order.map((c,i)=>{const col=CCOL[i%CCOL.length], lv=aggLevel(loc[c]||[]);
    return {type:'line',label:c,data:lv.map(x=>x==null?null:x*k),yAxisID:'yV',

}
// Level-3 country view: 값(value) / 비중(share%) / YoY / 단가(¥/kg)
function countryView(code){
  const {order,loc,locw}=countryLoc(code); if(!order) return {ds:[],kind:'value'};
  const k=CUR[ST.cur].mult, lvl={}, wlv={}; order.forEach(c=>{lvl[c]=aggLevel(loc[c]||[]); wlv[c]=aggLevel(locw[c]||[]);});
  const n=(lvl[order[0]]||[]).length, cm=ST.cmetric||'value';
  const area=(c,i,d)=>({type:'line',label:c,data:d,yAxisID:'yV',backgroundColor:CCOL[i%CCOL.length]+'cc',borderColor:CCOL[i%CCOL.length],borderWidth:.7,pointRadius:0,fill:true,tension:.2,stack:'c'});
  const line=(c,i,d)=>({type:'line',label:c,data:d,yAxisID:'yV',borderColor:CCOL[i%CCOL.length],borderWidth:1.4,pointRadius:0,tension:.25,spanGaps:true});
  if(cm==='value') return {kind:'value', ds:order.map((c,i)=>area(c,i,lvl[c].map(x=>x==null?null:x*k)))};
  if(cm==='share'){ const tot=new Array(n).fill(0); order.forEach(c=>lvl[c].forEach((x,j)=>tot[j]+=(x||0)));
    return {kind:'share', ds:order.map((c,i)=>area(c,i,lvl[c].map((x,j)=>tot[j]>0?x/tot[j]:null)))}; }
  if(cm==='yoy') return {kind:'yoy', ds:order.map((c,i)=>line(c,i,yoyG(lvl[c])))};
  return {kind:'unit', ds:order.map((c,i)=>line(c,i,lvl[c].map((x,j)=>wlv[c][j]>0?x*k/wlv[c][j]:null)))};
}
function countryViewOpts(kind){
  const fmtY = kind==='share'?(v=>(v*100).toFixed(0)+'%') : kind==='yoy'?(v=>(v*100).toFixed(0)+'%') : kind==='unit'?(v=>CUR[ST.cur].sym+fmtNum(v)) : (v=>fmtV(v/CUR[ST.cur].mult));

function dDatasets(code){

// ---------- time-range control (presets + drag brush) ----------
function applyRange(){ const mn=xMin(), mx=xMax(); for(const k in charts){ if(k.endsWith('_y')||k.endsWith('_m'))continue; const c=charts[k]; const sx=c&&c.options&&c.options.scales&&c.options.scales.x; if(sx){ sx.min=mn; sx.max=mx; c.update('none'); } } }
function updateRangeUI(){ document.querySelectorAll('.pill.r').forEach(p=>p.classList.toggle('on',p.dataset.range===ST.range)); }
function positionBrush(){ const N=MONTHS.length-1, w=document.getElementById('brushWin'); if(!w||N<=0)return; w.style.left=(ST.r0/N*100)+'%'; w.style.width=((ST.r1-ST.r0)/N*100)+'%'; }
function setPreset(p){ const N=MONTHS.length-1; let r0=0;
  if(p==='3m')r0=N-2; else if(p==='6m')r0=N-5; else if(p==='1y')r0=N-11; else if(p==='3y')r0=N-35; else if(p==='5y')r0=N-59; else if(p==='10y')r0=N-119;
  else if(p==='ytd'){ const ji=MONTHS.indexOf(MONTHS[N].slice(0,4)+'-01'); r0=ji>=0?ji:0; } else r0=0;
  ST.r0=Math.max(0,r0); ST.r1=N; ST.range=p; updateRangeUI(); positionBrush(); applyRange(); }
function drawBrushSpark(){ const c=document.querySelector('#brush canvas'); if(!c)return; const r=c.getBoundingClientRect(); if(!r.width)return;
  c.width=r.width*2; c.height=r.height*2; const ctx=c.getContext('2d'); ctx.setTransform(2,0,0,2,0,0); ctx.clearRect(0,0,r.width,r.height);
  const s=(ST.company?sumDetail('core',compPorts()):sumDetail('core',P.companies[0].ports)).exp.v, n=s.length, mx=Math.max.apply(null,s)||1;
  ctx.beginPath(); ctx.strokeStyle='rgba(61,139,253,.55)'; ctx.lineWidth=1;
  for(let i=0;i<n;i++){ const x=i/(n-1)*r.width, y=r.height-(s[i]/mx)*(r.height-5)-3; i?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.stroke(); }
let _drag=null;
function _idx(x){ const r=document.getElementById('brush').getBoundingClientRect(); let f=(x-r.left)/r.width; f=Math.max(0,Math.min(1,f)); return Math.round(f*(MONTHS.length-1)); }
function initBrush(){
  document.querySelectorAll('.pill.r').forEach(p=>p.onclick=()=>setPreset(p.dataset.range));
  const win=document.getElementById('brushWin');
  win.addEventListener('pointerdown',e=>{ const m=e.target.classList.contains('bh-l')?'l':e.target.classList.contains('bh-r')?'r':'win';
    _drag={m,i0:_idx(e.clientX),r0:ST.r0,r1:ST.r1}; try{e.target.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  window.addEventListener('pointermove',e=>{ if(!_drag)return; const N=MONTHS.length-1, idx=_idx(e.clientX);
    if(_drag.m==='l') ST.r0=Math.max(0,Math.min(idx,ST.r1-1));
    else if(_drag.m==='r') ST.r1=Math.min(N,Math.max(idx,ST.r0+1));
    else { const wlen=_drag.r1-_drag.r0; let nr0=_drag.r0+(idx-_drag.i0); nr0=Math.max(0,Math.min(nr0,N-wlen)); ST.r0=nr0; ST.r1=nr0+wlen; }
    ST.range='custom'; updateRangeUI(); positionBrush(); applyRange(); });
  window.addEventListener('pointerup',()=>{_drag=null;});
  window.addEventListener('resize',()=>{drawBrushSpark();positionBrush();});
  drawBrushSpark(); positionBrush(); updateRangeUI();
}
